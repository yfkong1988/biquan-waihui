<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>盯盘助手 - 专业版</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; }  
        body {  
            font-family: 'Microsoft YaHei', Arial, sans-serif;  
            background: linear-gradient(135deg, #f0b90b 0%, #f5a623 100%);  
            min-height: 100vh;  
            padding: 20px;  
        }  
        .container { max-width: 1400px; margin: 0 auto; }  
        .header {  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            padding: 20px;  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            margin-bottom: 20px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .header h1 { font-size: 28px; color: #f0b90b; }  
        .btn {  
            padding: 10px 20px;  
            background: #f0b90b;  
            border: none;  
            border-radius: 8px;  
            color: #fff;  
            font-weight: bold;  
            cursor: pointer;  
            text-decoration: none;  
            margin-left: 10px;  
        }  
        .btn-logout { background: #f6465d; }  
        .main-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-bottom: 20px; }  
        .chart-section {  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            padding: 20px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .chart-controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }  
        .chart-controls select, .chart-controls button {  
            padding: 8px 15px;  
            background: #f0b90b;  
            border: none;  
            border-radius: 6px;  
            color: #fff;  
            cursor: pointer;  
        }  
        #chart-container { height: 500px; background: #ffffff; border-radius: 8px; }  
        .card {  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            padding: 20px;  
            margin-bottom: 20px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .card h3 { color: #f0b90b; margin-bottom: 15px; }  
        .info-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0b90b33; }  
        .info-up { color: #0ecb81; font-weight: bold; }  
        .info-down { color: #f6465d; font-weight: bold; }  
        .signal-box { padding: 15px; margin: 10px 0; border-radius: 8px; text-align: center; font-weight: bold; }  
        .signal-buy { background: #0ecb8133; border: 2px solid #0ecb81; color: #0ecb81; }  
        .signal-sell { background: #f6465d33; border: 2px solid #f6465d; color: #f6465d; }  
        .signal-wait { background: #f0b90b33; border: 2px solid #f0b90b; color: #f0b90b; }  
        .alert-form { display: flex; flex-direction: column; gap: 10px; }  
        .alert-form input {  
            padding: 10px;  
            background: #fff;  
            border: 2px solid #f0b90b;  
            border-radius: 6px;  
            color: #333;  
        }  
        .alert-form button {  
            padding: 10px;  
            background: #f0b90b;  
            border: none;  
            border-radius: 6px;  
            color: #fff;  
            font-weight: bold;  
            cursor: pointer;  
        }  
        .log-box {  
            height: 200px;  
            overflow-y: auto;  
            background: #fff;  
            border: 2px solid #f0b90b;  
            border-radius: 8px;  
            padding: 10px;  
            font-family: 'Consolas', monospace;  
            font-size: 13px;  
        }  
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }  
        .status-on { background: #0ecb81; box-shadow: 0 0 10px #0ecb81; }  
        .status-off { background: #f6465d; }  
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }  
    </style>  
</head>  
<body>  
    <script>  
        const username = localStorage.getItem('cryptoUsername');  
        if(!username) { window.location.href = 'index.html'; }  
    </script>  
    <div class="container">  
        <div class="header">  
            <h1>📈 欢迎，<span id="display-name"></span>！盯盘助手</h1>  
            <div>  
                <button onclick="logout()" class="btn btn-logout">退出</button>  
                <button onclick="requestNotificationPermission()" class="btn">🔔 开启通知</button>  
            </div>  
        </div>  
        <div class="main-grid">  
            <div class="chart-section">  
                <div class="chart-controls">  
                    <select id="symbol-select" onchange="changeSymbol()">  
                        <option value="BTCUSDT">BTC/USDT</option>  
                        <option value="ETHUSDT">ETH/USDT</option>  
                        <option value="BNBUSDT">BNB/USDT</option>  
                        <option value="XRPUSDT">XRP/USDT</option>  
                        <option value="SOLUSDT">SOL/USDT</option>  
                    </select>  
                    <select id="interval-select" onchange="changeInterval()">  
                        <option value="1m">1 分钟</option>  
                        <option value="5m">5 分钟</option>  
                        <option value="15m">15 分钟</option>  
                        <option value="1h" selected>1 小时</option>  
                        <option value="4h">4 小时</option>  
                        <option value="1d">1 天</option>  
                    </select>  
                    <button onclick="toggleChart()">⏸ 暂停</button>  
                    <button onclick="clearLogs()">🗑 清空日志</button>  
                </div>  
                <div id="chart-container"></div>  
            </div>  
            <div class="sidebar">  
                <div class="card">  
                    <h3>📊 实时行情</h3>  
                    <div class="info-item"><span>当前价格</span><span id="current-price">--</span></div>  
                    <div class="info-item"><span>24h 涨跌</span><span id="price-change">--</span></div>  
                    <div class="info-item"><span>24h 最高</span><span id="price-high">--</span></div>  
                    <div class="info-item"><span>24h 最低</span><span id="price-low">--</span></div>  
                    <div class="info-item"><span>24h 成交量</span><span id="price-volume">--</span></div>  
                    <div class="info-item"><span>状态</span><span><span class="status-dot status-off" id="ws-status"></span><span id="connection-text">未连接</span></span></div>  
                </div>  
                <div class="card">  
                    <h3>🎯 交易信号</h3>  
                    <div class="info-item"><span>RSI(14)</span><span id="rsi-value">--</span></div>  
                    <div class="info-item"><span>成交量比</span><span id="volume-ratio">--</span></div>  
                    <div id="signal-display" class="signal-box signal-wait">○ 等待信号...</div>  
                </div>  
                <div class="card">  
                    <h3>⚠️ 预警设置</h3>  
                    <div class="alert-form">  
                        <input type="number" id="alert-price-high" placeholder="价格突破多少时提醒">  
                        <input type="number" id="alert-price-low" placeholder="价格跌破多少时提醒">  
                        <input type="number" id="alert-rsi-low" placeholder="RSI 低于多少时提醒 (如 30)" max="100">  
                        <input type="number" id="alert-rsi-high" placeholder="RSI 高于多少时提醒 (如 70)" max="100">  
                        <button onclick="saveAlerts()">💾 保存预警</button>  
                    </div>  
                </div>  
            </div>  
        </div>  
        <div class="card">  
            <h3>📝 信号日志</h3>  
            <div id="log-container" class="log-box"></div>  
        </div>  
    </div>  
    <script>  
        document.getElementById('display-name').textContent = username;  
        function logout() { localStorage.removeItem('cryptoUsername'); window.location.href = 'index.html'; }  
          
        let currentSymbol = 'BTCUSDT', currentInterval = '60', isChartPaused = false;  
        let alerts = { priceHigh: null, priceLow: null, rsiLow: 30, rsiHigh: 70 };  
        let priceHistory = [];  
        let isConnected = false;  
          
        window.onload = function() {   
            initChart();   
            fetchPrice();   
            loadAlerts();   
            addLog('系统启动', 'normal');  
            // 每 3 秒刷新价格  
            setInterval(fetchPrice, 3000);  
        };  
          
        function initChart() {   
            document.getElementById('chart-container').innerHTML = '';   
            new TradingView.widget({   
                width: '100%',   
                height: 500,   
                symbol: 'BINANCE:' + currentSymbol,   
                interval: currentInterval,   
                timezone: 'Asia/Shanghai',   
                theme: 'light',   
                style: '1',   
                locale: 'zh_CN',   
                toolbar_bg: '#ffffff',   
                enable_publishing: false,   
                hide_top_toolbar: false,   
                container_id: 'chart-container',   
                studies: ['RSI@tv-basicstudies', 'Volume@tv-basicstudies']   
            });   
        }  
          
        function changeSymbol() {   
            currentSymbol = document.getElementById('symbol-select').value;   
            priceHistory = [];  
            initChart();   
            fetchPrice();  
        }  
          
        function changeInterval() {   
            currentInterval = document.getElementById('interval-select').value;   
            initChart();   
        }  
          
        function toggleChart() { isChartPaused = !isChartPaused; }  
          
        // 用 REST API 获取真实价格  
        async function fetchPrice() {  
            if(isChartPaused) return;  
              
            try {  
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=$ {currentSymbol}`);  
                const data = await response.json();  
                  
                const price = parseFloat(data.lastPrice).toFixed(2);  
                const change = parseFloat(data.priceChangePercent).toFixed(2);  
                const high = parseFloat(data.highPrice).toFixed(2);  
                const low = parseFloat(data.lowPrice).toFixed(2);  
                const volume = parseFloat(data.volume).toFixed(2);  
                  
                // 更新界面  
                document.getElementById('current-price').textContent = '$' + price;  
                const changeElem = document.getElementById('price-change');  
                changeElem.textContent = change + '%';  
                changeElem.className = change >= 0 ? 'info-up' : 'info-down';  
                document.getElementById('price-high').textContent = '$' + high;  
                document.getElementById('price-low').textContent = '$' + low;  
                document.getElementById('price-volume').textContent = volume;  
                  
                // 更新状态  
                if(!isConnected) {  
                    isConnected = true;  
                    document.getElementById('ws-status').className = 'status-dot status-on';  
                    document.getElementById('connection-text').textContent = '已连接';  
                }  
                  
                // 保存价格历史用于计算 RSI  
                priceHistory.push(parseFloat(price));  
                if(priceHistory.length > 50) priceHistory.shift();  
                  
                // 计算 RSI  
                const rsi = calculateRSI(priceHistory);  
                document.getElementById('rsi-value').textContent = rsi.toFixed(2);  
                  
                // 成交量比（简化）  
                const volumeRatio = (parseFloat(data.volume) / 1000000).toFixed(2);  
                document.getElementById('volume-ratio').textContent = volumeRatio + 'x';  
                  
                // 生成信号  
                generateSignal(rsi, volumeRatio);  
                  
                // 检查预警  
                checkPriceAlerts(price);  
                checkRSIAlerts(rsi);  
                  
            } catch(error) {  
                console.error('获取价格失败:', error);  
                isConnected = false;  
                document.getElementById('ws-status').className = 'status-dot status-off';  
                document.getElementById('connection-text').textContent = '连接失败';  
            }  
        }  
          
        // 真实计算 RSI  
        function calculateRSI(prices) {  
            if(prices.length < 15) return 50;  
              
            let gains = 0, losses = 0;  
            for(let i = prices.length - 14; i < prices.length; i++) {  
                const diff = prices[i] - prices[i-1];  
                if(diff > 0) gains += diff;  
                else losses -= diff;  
            }  
              
            const avgGain = gains / 14;  
            const avgLoss = losses / 14;  
              
            if(avgLoss === 0) return 100;  
            const rs = avgGain / avgLoss;  
            return 100 - (100 / (1 + rs));  
        }  
          
        function generateSignal(rsi, volumeRatio) {   
            const sd = document.getElementById('signal-display');   
            if(rsi < 30) {   
                sd.className = 'signal-box signal-buy';   
                sd.textContent = '✅ 买入机会 (RSI 超卖)';   
                showAlert('买入信号', currentSymbol + ' RSI 超卖');   
            } else if(rsi > 70) {   
                sd.className = 'signal-box signal-sell';   
                sd.textContent = '⚠️ 卖出风险 (RSI 超买)';   
                showAlert('卖出信号', currentSymbol + ' RSI 超买');   
            } else if(volumeRatio > 3) {   
                sd.className = 'signal-box signal-buy';   
                sd.textContent = '🔥 放量突破';   
                showAlert('放量信号', currentSymbol + ' 成交量放大');   
            } else {   
                sd.className = 'signal-box signal-wait';   
                sd.textContent = '○ 观望';   
            }   
        }  
          
        function checkPriceAlerts(price) {   
            if(alerts.priceHigh && price >= alerts.priceHigh) {   
                showAlert('价格突破', currentSymbol + ' 突破 $' + alerts.priceHigh);   
                alerts.priceHigh = null;   
                saveAlerts();   
            }   
            if(alerts.priceLow && price <= alerts.priceLow) {   
                showAlert('价格跌破', currentSymbol + ' 跌破 $' + alerts.priceLow);   
                alerts.priceLow = null;   
                saveAlerts();   
            }   
        }  
          
        function checkRSIAlerts(rsi) {   
            if(rsi <= alerts.rsiLow) showAlert('RSI 超卖', currentSymbol + ' RSI=' + rsi.toFixed(2));   
            if(rsi >= alerts.rsiHigh) showAlert('RSI 超买', currentSymbol + ' RSI=' + rsi.toFixed(2));   
        }  
          
        function showAlert(title, message) {   
            if(Notification.permission === 'granted') new Notification(title, { body: message });   
        }  
          
        function requestNotificationPermission() {   
            Notification.requestPermission().then(p => {   
                if(p === 'granted') new Notification('通知已开启', { body: '当有交易信号时会提醒您' });   
            });   
        }  
          
        function addLog(msg, type) {   
            const c = document.getElementById('log-container');   
            const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });   
            const item = document.createElement('div');   
            item.className = 'log-item';   
            item.innerHTML = '<span style="color:#888">[' + t + ']</span> ' + msg;   
            c.insertBefore(item, c.firstChild);   
        }  
          
        function clearLogs() { document.getElementById('log-container').innerHTML = ''; }  
          
        function saveAlerts() {   
            alerts.priceHigh = document.getElementById('alert-price-high').value || null;   
            alerts.priceLow = document.getElementById('alert-price-low').value || null;   
            alerts.rsiLow = document.getElementById('alert-rsi-low').value || 30;   
            alerts.rsiHigh = document.getElementById('alert-rsi-high').value || 70;   
            localStorage.setItem('cryptoAlerts', JSON.stringify(alerts));   
        }  
          
        function loadAlerts() {   
            const saved = localStorage.getItem('cryptoAlerts');   
            if(saved) {   
                alerts = JSON.parse(saved);   
                document.getElementById('alert-price-high').value = alerts.priceHigh || '';   
                document.getElementById('alert-price-low').value = alerts.priceLow || '';   
            }   
        }  
    </script>  
</body>  
</html>
