<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的极简盯盘助手</title>
    <style>
        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /*以此深色背景护眼*/
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f0b90b; /* 币安黄 */
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(240, 185, 11, 0.3);
        }

        /* 卡片容器 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* 单个币种卡片 */
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #f0b90b;
        }

        .symbol {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .price {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .change {
            font-size: 1.1em;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 涨跌颜色 */
        .up { color: #0ecb81; } /* 涨 - 绿色 */
        .down { color: #f6465d; } /* 跌 - 红色 */
        
        .bg-up { background-color: rgba(14, 203, 129, 0.1); color: #0ecb81; }
        .bg-down { background-color: rgba(246, 70, 93, 0.1); color: #f6465d; }

        .loading {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }
        
        .footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>🚀 极简实时行情 (Binance)</h1>

    <div id="app" class="container">
        <div class="loading">正在连接交易所数据...</div>
    </div>

    <div class="footer">数据每3秒自动刷新 | 来源: Binance Public API</div>

    <script>
        // 你想监控的币种列表 (USDT本位)
        const symbols = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT'];

        async function fetchData() {
            const app = document.getElementById('app');
            
            try {
                // 使用币安公共API获取24小时行情
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await response.json();

                // 清空加载提示（如果是第一次加载）
                if(app.innerText.includes("正在连接")) app.innerHTML = '';

                // 过滤出我们关心的币种
                const myCoins = data.filter(item => symbols.includes(item.symbol));

                // 生成HTML
                let htmlContent = '';
                myCoins.forEach(coin => {
                    const price = parseFloat(coin.lastPrice).toFixed(coin.symbol.includes('USDT') ? 2 : 4);
                    const percent = parseFloat(coin.priceChangePercent).toFixed(2);
                    const isUp = percent >= 0;
                    const colorClass = isUp ? 'up' : 'down';
                    const bgClass = isUp ? 'bg-up' : 'bg-down';
                    const sign = isUp ? '+' : '';

                    htmlContent += `
                        <div class="card">
                            <span class="symbol">${coin.symbol.replace('USDT', '')} / USDT</span>
                            <div class="price ${colorClass}">$${price}</div>
                            <div class="change ${bgClass}">
                                ${sign}${percent}%
                            </div>
                        </div>
                    `;
                });

                app.innerHTML = htmlContent;

            } catch (error) {
                console.error('获取数据失败:', error);
                // 如果出错，不要清空界面，保留旧数据或显示错误
                if(app.innerHTML === '') {
                     app.innerHTML = '<div class="loading" style="color:red">数据加载失败，请检查网络或稍后刷新。</div>';
                }
            }
        }

        // 立即运行一次
        fetchData();

        // 设置定时器，每3000毫秒（3秒）刷新一次
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
