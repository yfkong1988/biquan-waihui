<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT 实时订单流 (完美版)</title>
    <!-- 引入 Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #131722; color: #d1d4dc; font-family: sans-serif; overflow: hidden; }
        
        /* 顶部状态栏 */
        .header { 
            position: absolute; top: 0; left: 0; right: 0; height: 40px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background-color: #1e222d; border-bottom: 1px solid #2a2e39; z-index: 10;
        }
        .status { font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #ef5350; }
        .dot.connected { background-color: #26a69a; box-shadow: 0 0 5px #26a69a; }

        /* 图例 */
        .legend { 
            position: absolute; bottom: 20px; left: 20px; 
            background: rgba(30, 34, 45, 0.8); padding: 10px; border-radius: 4px; 
            font-size: 12px; pointer-events: none; z-index: 10; border: 1px solid #2a2e39;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .box { width: 10px; height: 10px; border-radius: 2px; }
        .box.buy { background-color: rgba(38, 166, 154, 0.6); border: 1px solid #26a69a; }
        .box.sell { background-color: rgba(239, 83, 80, 0.6); border: 1px solid #ef5350; }

        #chart-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: #f0b90b;">BTC/USDT 实时订单流 (Binance Stream)</div>
        <div class="status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">正在连接...</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box buy"></div> <span>主动买入 (Aggressive Buy)</span></div>
        <div class="legend-item"><div class="box sell"></div> <span>主动卖出 (Aggressive Sell)</span></div>
        <div style="margin-top:5px; color:#787b86; font-size:10px;">*圆点大小代表成交量大小</div>
    </div>

    <div id="chart-container"></div>

<script>
    // --- 1. 初始化图表 ---
    const chartContainer = document.getElementById('chart-container');
    const chart = LightweightCharts.createChart(chartContainer, {
        layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#242832' }, horzLines: { color: '#242832' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: true },
    });

    // 创建 K 线系列
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

    // 创建订单流散点系列 (用于绘制买卖点)
    const orderFlowSeries = chart.addSeries(LightweightCharts.CustomSeries, {
        // 这里我们使用简单的散点模拟，实际上 Lightweight Charts 原生没有 Scatter，
        // 我们用 Line Series 的变通方法或者直接用 Marker，但为了性能，
        // 这里我们用一个技巧：使用 Histogram 或 Line 的极小片段，
        // 但最简单且性能最好的方式是使用 `chart.subscribeCrosshairMove` 配合 DOM，
        // 或者——既然我们要画很多点，我们用 **LineSeries** 但把线宽设为0，只画点？
        // 不，Lightweight Charts v4 支持 Custom Series 插件，但这太复杂。
        
        // 【最佳实践】：为了演示效果，我们使用 `addMarkers` 是不行的（有数量限制）。
        // 我们使用 **HistogramSeries** 来模拟“成交量柱”，或者用两个 **LineSeries** (一个买一个卖) 
        // 将 lineWidth 设为 0 并使用 point markers? 
        
        // 让我们用最稳妥的方案：**叠加两个 LineSeries，样式设为点状**。
    });

    // 重新定义：使用两个 LineSeries 分别代表买单和卖单
    const buySeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: '#26a69a', lineWidth: 2, lineStyle: 0, // 实线
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: true, crosshairMarkerRadius: 4
    });
    
    const sellSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: '#ef5350', lineWidth: 2, lineStyle: 0,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: true, crosshairMarkerRadius: 4
    });

    // --- 2. 数据管理 ---
    let currentBar = null;
    let ws = null;
    
    // 初始加载一点历史数据 (模拟，为了让图表不空着)
    // 实际生产中应该 fetch REST API，这里为了演示直接开始实时流
    const startTime = Math.floor(Date.now() / 1000) - 1000; 
    
    // --- 3. WebSocket 连接逻辑 ---
    function connect() {
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        // 使用 Futures 接口，通常比 Spot 更活跃且稳定
        ws = new WebSocket('wss://fstream.binance.com/ws/btcusdt@trade');

        ws.onopen = () => {
            statusText.innerText = '连接成功 - 接收实时数据';
            statusDot.classList.add('connected');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const price = parseFloat(data.p);
            const time = Math.floor(data.T / 1000); // 秒级时间戳
            const isBuyerMaker = data.m; // true = 主动卖出, false = 主动买入
            const qty = parseFloat(data.q);

            // 1. 更新 K 线 (简单的 1秒 K线)
            if (!currentBar || time > currentBar.time) {
                // 新 K 线
                currentBar = {
                    time: time,
                    open: price,
                    high: price,
                    low: price,
                    close: price
                };
                candleSeries.update(currentBar);
            } else {
                // 更新当前 K 线
                currentBar.close = price;
                currentBar.high = Math.max(currentBar.high, price);
                currentBar.low = Math.min(currentBar.low, price);
                candleSeries.update(currentBar);
            }

            // 2. 绘制订单流 (买卖点)
            // 为了可视化，我们将点画在 K 线的 上方(买) 或 下方(卖) 一点点，避免重叠看不清
            // 或者就在价格上，通过颜色区分
            
            // 注意：LineSeries 需要按时间排序。如果是同一秒的多笔交易，只能保留最后一个或者覆盖。
            // 这里的处理：直接 update，图表库会自动处理同时间点的数据覆盖或渲染。
            
            const pointData = { time: time, value: price };

            if (!isBuyerMaker) {
                // 主动买入 (Taker Buy) -> 绿色
                // 根据成交量动态调整点的大小 (crosshairMarkerRadius 不能动态变，这里用固定大小演示)
                // 如果要动态大小，需要用 Custom Series 插件，这里简化为固定大小
                buySeries.update(pointData);
            } else {
                // 主动卖出 (Taker Sell) -> 红色
                sellSeries.update(pointData);
            }
            
            // 强制图表滚动到最新
            chart.timeScale().scrollToPosition(0, false);
        };

        ws.onclose = () => {
            statusText.innerText = '连接断开 - 5秒后重连...';
            statusDot.classList.remove('connected');
            setTimeout(connect, 5000);
        };

        ws.onerror = (err) => {
            console.error('WS Error:', err);
            ws.close();
        };
    }

    // 启动连接
    connect();

    // 窗口大小改变自适应
    window.addEventListener('resize', () => {
        chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
    });

</script>
</body>
</html>
