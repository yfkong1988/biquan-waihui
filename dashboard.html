<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极致实时订单流 (Real-time Footprint)</title>
    <!-- 引入 Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0e11; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* 顶部控制栏 */
        .header { display: flex; align-items: center; padding: 10px 20px; background-color: #1e2329; border-bottom: 1px solid #2b3139; height: 50px; box-sizing: border-box; justify-content: space-between; }
        .logo { font-weight: bold; font-size: 18px; color: #fcd535; display: flex; align-items: center; gap: 10px; }
        .controls { display: flex; gap: 10px; }
        
        select, button { background: #2b3139; border: 1px solid #474d57; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; outline: none; font-size: 14px; transition: 0.2s; }
        select:hover, button:hover { background: #474d57; border-color: #fcd535; }
        button.active { background: #fcd535; color: black; border-color: #fcd535; font-weight: bold; }

        /* 图表容器 */
        #chart-container { position: relative; width: 100%; height: calc(100vh - 70px); }
        
        /* 状态指示器 */
        .status-dot { height: 8px; width: 8px; background-color: #ef5350; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.connected { background-color: #26a69a; box-shadow: 0 0 5px #26a69a; }
        .status-text { font-size: 12px; color: #848e9c; }

        /* 自定义 Canvas 覆盖层样式 (用于绘制热力格子) */
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <span id="ws-status" class="status-dot"></span>
        <span id="symbol-title">BTC/USDT</span> 
        <span style="font-size:12px; color:#848e9c; font-weight:normal;">实时逐笔成交热力图</span>
    </div>
    <div class="controls">
        <select id="symbol-select">
            <option value="btcusdt">BTC/USDT</option>
            <option value="bnbusdt">BNB/USDT</option>
            <option value="reusdt">RE/USDT</option> 
        </select>
        <div style="display:flex; gap:2px; background:#2b3139; padding:2px; border-radius:4px;">
            <button onclick="changeInterval('5m')" class="tf-btn active" data-tf="5m">5m</button>
            <button onclick="changeInterval('15m')" class="tf-btn" data-tf="15m">15m</button>
            <button onclick="changeInterval('1h')" class="tf-btn" data-tf="1h">1H</button>
        </div>
    </div>
</div>

<div id="chart-container"></div>

<script>
    // --- 配置与状态 ---
    let chart;
    let candleSeries;
    let ws = null;
    let currentSymbol = 'btcusdt';
    let currentInterval = '5m'; // 仅用于K线周期，热力图始终基于实时成交
    
    // 核心数据结构：存储当前可见范围内的成交量矩阵
    // 格式: { priceLevel: { buyVol: 0, sellVol: 0 } }
    let volumeMatrix = {}; 
    
    // 颜色配置
    const COLORS = {
        bg: '#0b0e11',
        up: '#26a69a',   // 买入绿
        down: '#ef5350', // 卖出红
        text: '#555'
    };

    // --- 初始化图表 ---
    function initChart() {
        const container = document.getElementById('chart-container');
        chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: COLORS.bg, textColor: '#555' },
            grid: { vertLines: { color: '#1e2329' }, horzLines: { color: '#1e2329' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { timeVisible: true, secondsVisible: true },
            rightPriceScale: { borderColor: '#2b3139' },
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: COLORS.up, downColor: COLORS.down, borderVisible: false, wickUpColor: COLORS.up, wickDownColor: COLORS.down,
        });

        // 监听窗口大小变化
        window.addEventListener('resize', () => chart.resize(container.clientWidth, container.clientHeight));
        
        // 每次视图变化（滚动或缩放），我们需要重绘 Canvas 覆盖层
        chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
             // 简单的防抖重绘逻辑可以在这里加，这里为了实时性直接调用渲染循环
        });
    }

    // --- 核心逻辑：连接 WebSocket ---
    function connectStream() {
        if (ws) ws.close();

        const statusDot = document.getElementById('ws-status');
        statusDot.classList.remove('connected');
        document.getElementById('symbol-title').innerText = currentSymbol.toUpperCase().replace('USDT', '/USDT');

        // 币安聚合交易流 (AggTrade Stream) - 这是真正的实时逐笔数据
        // 注意：这里我们不订阅 K 线流，因为我们要自己根据 Tick 数据来画热力图
        // 但为了有背景 K 线，我们还是会加载历史 K 线
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol}@aggTrade`);

        ws.onopen = () => {
            statusDot.classList.add('connected');
            console.log("已连接实时数据流");
            loadHistoricalData(); // 连接成功后先拉一点历史 K 线做背景
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleTick(data);
        };

        ws.onclose = () => {
            statusDot.classList.remove('connected');
            setTimeout(connectStream, 3000); // 断线重连
        };
    }

    // --- 处理每一笔实时成交 (Tick) ---
    function handleTick(trade) {
        // trade.p = 价格, trade.q = 数量, trade.m = 是否为主动卖出 (true=卖, false=买)
        const price = parseFloat(trade.p);
        const qty = parseFloat(trade.q);
        const isSell = trade.m;
        const time = trade.T / 1000; // 秒级时间戳

        // 1. 更新后台 K 线 (为了保持图表在动)
        // 这里做一个简易的实时更新，实际生产环境应该维护一个完整的 K 线对象
        // 为了演示简单，我们只依赖 loadHistoricalData 加载的基础，这里主要关注热力图
        
        // 2. 更新热力矩阵 (Volume Matrix)
        // 将价格四舍五入到整数位或小数位，作为 Key，避免格子太碎
        const precision = currentSymbol.includes('btc') ? 0 : 2; // BTC取整，其他保留2位
        const priceKey = price.toFixed(precision); 

        if (!volumeMatrix[priceKey]) {
            volumeMatrix[priceKey] = { buy: 0, sell: 0, time: time };
        }
        
        if (isSell) {
            volumeMatrix[priceKey].sell += qty;
        } else {
            volumeMatrix[priceKey].buy += qty;
        }
        
        // 更新时间戳，确保格子显示在最新的位置
        volumeMatrix[priceKey].time = time;

        // 3. 触发重绘
        requestAnimationFrame(renderHeatmapOverlay);
    }

    // --- 加载历史 K 线 (作为背景) ---
    async function loadHistoricalData() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol.toUpperCase()}&interval=${currentInterval}&limit=100`);
            const data = await res.json();
            
            const candles = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4])
            }));
            
            candleSeries.setData(candles);
            
            // 清空旧的热力图数据，准备接收新的
            volumeMatrix = {}; 
            
        } catch (e) {
            console.error("获取历史数据失败", e);
        }
    }

    // --- 渲染热力图覆盖层 (Canvas API) ---
    // 这是实现“格子效果”的关键，我们在 Lightweight Charts 上方盖一层透明 Canvas
    function renderHeatmapOverlay() {
        // 获取图表容器的 Canvas 上下文 (这里我们用一种 hack 方式，直接在 DOM 里找或者创建一个 overlay)
        // 为了代码简洁且不影响原库，我们使用 Lightweight Charts 的 Custom Series 或者是直接操作 DOM
        // 这里采用最简单的：利用 Lightweight Charts 的 Marker 或者是 Background Color 很难做到这种精细度
        // 所以我们手动创建一个 Canvas 盖在上面
        
        let overlay = document.getElementById('heatmap-overlay');
        if (!overlay) {
            overlay = document.createElement('canvas');
            overlay.id = 'heatmap-overlay';
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.pointerEvents = 'none'; // 让鼠标事件穿透
            document.getElementById('chart-container').appendChild(overlay);
        }

        const container = document.getElementById('chart-container');
        overlay.width = container.clientWidth;
        overlay.height = container.clientHeight;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        // 获取坐标转换工具
        const timeScale = chart.timeScale();
        const priceScale = candleSeries.priceScale();

        // 遍历矩阵，画出矩形
        // 性能优化：只画屏幕可见区域的格子
        const visibleRange = timeScale.getVisibleLogicalRange();
        if (!visibleRange) return;

        // 简单的可视化逻辑：把每个有数据的 priceKey 画出来
        // 注意：真实的 Footprint 需要知道每个格子属于哪根 K 线 (Time Bin)
        // 这里的简化版逻辑：以价格为 Y 轴，以时间为 X 轴画点
        
        Object.keys(volumeMatrix).forEach(priceStr => {
            const data = volumeMatrix[priceStr];
            const price = parseFloat(priceStr);
            
            // 计算 Y 坐标 (价格 -> 像素)
            const y = priceScale.priceToCoordinate(price);
            
            // 计算 X 坐标 (时间 -> 像素)
            const x = timeScale.timeToCoordinate(data.time);

            if (x && y) {
                // 决定颜色强度
                const totalVol = data.buy + data.sell;
                const intensity = Math.min(totalVol / 5, 0.8); // 归一化透明度，5是系数，可调
                
                let color;
                if (data.buy > data.sell) {
                    // 绿色主导
                    ctx.fillStyle = `rgba(38, 166, 154, ${intensity})`;
                } else {
                    // 红色主导
                    ctx.fillStyle = `rgba(239, 83, 80, ${intensity})`;
                }

                // 画格子 (宽度固定为 10px 模拟时间切片，高度由价格精度决定)
                // 这里的 10px 是个估算值，真实开发需要根据 K 线宽度动态计算
                const barWidth = 10; 
                const barHeight = 4; // 格子高度
                
                ctx.fillRect(x - barWidth/2, y - barHeight/2, barWidth, barHeight);
                
                // 可选：画上数字 (如果格子够大)
                if (intensity > 0.4) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '8px Arial';
                    ctx.fillText(Math.floor(totalVol), x - 5, y + 3);
                }
            }
        });
    }

    // --- 交互控制 ---
    document.getElementById('symbol-select').addEventListener('change', (e) => {
        currentSymbol = e.target.value;
        connectStream();
    });

    window.changeInterval = (tf) => {
        currentInterval = tf;
        // 更新按钮样式
        document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tf-btn[data-tf="${tf}"]`).classList.add('active');
        
        // 重新加载背景 K 线，但不重置 WebSocket (因为逐笔流是不分周期的)
        loadHistoricalData();
    };

    // 启动
    initChart();
    connectStream();

</script>
</body>
</html>
