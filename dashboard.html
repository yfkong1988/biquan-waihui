<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT 实时订单流 (已修复)</title>
    <!-- 强制指定使用 v4.1.0 版本，确保 API 一致性 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #131722; color: #d1d4dc; font-family: sans-serif; overflow: hidden; }
        
        /* 顶部状态栏 */
        .header { position: absolute; top: 0; left: 0; right: 0; height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; background: rgba(19, 23, 34, 0.8); backdrop-filter: blur(5px); border-bottom: 1px solid #2a2e39; }
        .title { font-weight: bold; font-size: 16px; color: #f0b90b; }
        .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #ef5350; transition: background-color 0.3s; }
        .dot.connected { background-color: #26a69a; box-shadow: 0 0 5px #26a69a; }
        
        /* 图表容器 */
        #chart-container { width: 100vw; height: 100vh; }
        
        /* 图例 */
        .legend { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(30, 34, 45, 0.8); padding: 10px; border-radius: 4px; font-size: 12px; border: 1px solid #2a2e39; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-item:last-child { margin-bottom: 0; }
        .color-box { width: 10px; height: 10px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">BTC/USDT 实时订单流 (Binance Stream)</div>
        <div class="status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">正在初始化...</span>
        </div>
    </div>

    <div id="chart-container"></div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background: #26a69a;"></div>主动买入 (Aggressive Buy)</div>
        <div class="legend-item"><div class="color-box" style="background: #ef5350;"></div>主动卖出 (Aggressive Sell)</div>
        <div style="margin-top:5px; color:#787b86; font-size:10px;">*圆点大小代表成交量大小</div>
    </div>

    <script>
        // 1. 初始化图表
        const chartContainer = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { timeVisible: true, secondsVisible: true },
        });

        // 2. 添加 K 线系列 (注意：这里修复了 API 调用)
        // 在 v4 版本中，依然是 addCandlestickSeries，但如果报错，通常是因为库没加载完或者版本冲突
        // 这里的写法是标准的 v4 写法
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        });

        // 3. 添加“气泡”系列用来画订单流 (使用 Histogram 或 Scatter 模拟)
        // 这里我们用一个特殊的技巧：使用 LineSeries 但把线宽设为0，然后用 Marker 或者单独的数据层
        // 为了性能，我们用两个 Histogram 来模拟买卖单分布，或者直接用散点图逻辑
        // 简单起见，我们在 K 线上叠加一个透明的 Series 专门用来显示 Markers (太密集会卡)
        // 更好的方案：使用 Histogram 显示净买入量
        
        // 让我们用最直观的 "成交量分布柱状图" 代替杂乱的气泡
        const volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceScaleId: '', // 设置为空字符串，让它和主图重叠
            scaleMargins: { top: 0.8, bottom: 0 }, // 放在底部
        });

        // 状态管理
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        let ws = null;
        let lastCandle = null;
        let currentBar = { time: 0, open: 0, high: 0, low: 0, close: 0, volume: 0, isBuyVolume: 0 };

        function updateStatus(isConnected, text) {
            statusDot.className = isConnected ? 'dot connected' : 'dot';
            statusText.innerText = text;
        }

        // 4. 连接 WebSocket
        function connect() {
            updateStatus(false, '正在连接交易所...');
            
            // 使用 Binance 官方 WSS 接口
            ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');

            ws.onopen = () => {
                updateStatus(true, '连接成功 - 接收实时数据');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const k = data.k;
                
                // 构造 K 线数据
                const candle = {
                    time: k.t / 1000, // 转换为秒级时间戳
                    open: parseFloat(k.o),
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: parseFloat(k.c),
                };
                
                // 更新 K 线
                candleSeries.update(candle);

                // 构造成交量数据 (绿色代表买入多，红色代表卖出多)
                // 这是一个简化的逻辑：如果收盘价>开盘价，视为买入主导
                const isUp = candle.close >= candle.open;
                volumeSeries.update({
                    time: candle.time,
                    value: parseFloat(k.v),
                    color: isUp ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                });
            };

            ws.onerror = (err) => {
                console.error("WS Error", err);
                updateStatus(false, '连接错误 (请检查代理)');
            };

            ws.onclose = () => {
                updateStatus(false, '连接断开，3秒后重连...');
                setTimeout(connect, 3000);
            };
        }

        // 启动
        connect();

        // 窗口大小改变自适应
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
        });
    </script>
</body>
</html>
