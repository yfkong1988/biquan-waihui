<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业订单流可视化 (Order Flow)</title>
    <!-- 引入 Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #131722; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        
        /* 顶部控制栏 */
        .controls { 
            position: absolute; top: 10px; left: 10px; z-index: 20; 
            display: flex; gap: 10px; align-items: center; background: rgba(30, 34, 45, 0.9);
            padding: 8px 15px; border-radius: 6px; border: 1px solid #2a2e39;
        }
        
        select, button {
            background: #2a2e39; color: #d1d4dc; border: 1px solid #434651;
            padding: 5px 10px; border-radius: 4px; cursor: pointer; outline: none;
        }
        select:hover, button:hover { background: #363a45; }
        button.active { background: #2962ff; color: white; border-color: #2962ff; }

        /* 状态指示器 */
        .status { position: absolute; top: 10px; right: 10px; z-index: 20; font-size: 12px; color: #aaa; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .dot.green { background-color: #00c853; box-shadow: 0 0 5px #00c853; }
        .dot.red { background-color: #ff5252; }

        /* 图表容器 */
        #chart-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div class="controls">
        <select id="symbol-select">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="BNBUSDT">BNB/USDT</option>
            <option value="REIUSDT">REI/USDT</option>
        </select>
        <div style="display:flex; gap:2px;">
            <button data-tf="5m">5m</button>
            <button data-tf="15m">15m</button>
            <button data-tf="30m">30m</button>
            <button data-tf="1h" class="active">1H</button>
            <button data-tf="4h">4H</button>
            <button data-tf="1d">1D</button>
            <button data-tf="1w">1W</button>
        </div>
    </div>

    <div class="status"><span class="dot red" id="status-dot"></span><span id="status-text">正在连接...</span></div>
    <div id="chart-container"></div>

<script>
    // --- 配置与初始化 ---
    const chartContainer = document.getElementById('chart-container');
    const chart = LightweightCharts.createChart(chartContainer, {
        layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: false },
    });

    // 主K线系列
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });

    // 订单流气泡系列 (用散点图模拟)
    const orderFlowSeries = chart.addHistogramSeries({
        priceFormat: { type: 'volume' },
        priceScaleId: '', // 叠加在主图上
    });
    // 设置气泡图位于底层或顶层，这里我们尝试让它看起来像 Footprint
    orderFlowSeries.priceScale().applyOptions({ scaleMargins: { top: 0, bottom: 0 } });

    let currentSymbol = 'BTCUSDT';
    let currentInterval = '1h';
    let ws = null;

    // --- 核心逻辑 ---

    // 1. 获取历史数据
    async function fetchHistory(symbol, interval) {
        updateStatus('loading');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=1000`);
            const data = await res.json();
            
            const candles = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            candleSeries.setData(candles);

            // 生成模拟的订单流数据 (真实API不直接提供Footprint，需通过Tick数据聚合，这里做视觉模拟)
            const flowData = generateFlowVisuals(data);
            orderFlowSeries.setData(flowData);
            
            updateStatus('connected');
        } catch (e) {
            console.error(e);
            updateStatus('error');
        }
    }

    // 2. 生成视觉化的订单流气泡 (模拟算法)
    function generateFlowVisuals(klines) {
        return klines.map(k => {
            const isUp = k[4] >= k[1]; // Close >= Open
            const volume = parseFloat(k[5]);
            // 简单的视觉映射：成交量越大，数值越大，颜色区分买卖盘主导
            return {
                time: k[0] / 1000,
                value: isUp ? volume : -volume, // 正值在上方，负值在下方
                color: isUp ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)', // 半透明
            };
        });
    }

    // 3. WebSocket 实时推送
    function connectWS(symbol, interval) {
        if (ws) ws.close();
        const streamName = `${symbol.toLowerCase()}@kline_${interval}`;
        ws = new WebSocket(`wss://fstream.binance.com/ws/${streamName}`); // 使用合约接口数据更新快

        ws.onopen = () => updateStatus('connected');
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            
            const candle = {
                time: k.t / 1000,
                open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c)
            };
            candleSeries.update(candle);

            // 实时更新气泡 (简单处理：随K线更新)
            const isUp = candle.close >= candle.open;
            const vol = parseFloat(k.v);
            orderFlowSeries.update({
                time: candle.time,
                value: isUp ? vol : -vol,
                color: isUp ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
            });
        };
        ws.onerror = () => updateStatus('error');
    }

    // --- 界面交互 ---
    function updateStatus(state) {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        if (state === 'connected') {
            dot.className = 'dot green';
            text.innerText = '实时数据流接入中';
        } else if (state === 'loading') {
            dot.className = 'dot red';
            text.innerText = '加载历史数据...';
        } else {
            dot.className = 'dot red';
            text.innerText = '连接断开/错误';
        }
    }

    // 按钮事件绑定
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentInterval = e.target.dataset.tf;
            startDataFeed();
        });
    });

    document.getElementById('symbol-select').addEventListener('change', (e) => {
        currentSymbol = e.target.value;
        startDataFeed();
    });

    function startDataFeed() {
        fetchHistory(currentSymbol, currentInterval).then(() => {
            connectWS(currentSymbol, currentInterval);
        });
    }

    // 窗口自适应
    window.addEventListener('resize', () => {
        chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
    });

    // 启动
    startDataFeed();

</script>
</body>
</html>
