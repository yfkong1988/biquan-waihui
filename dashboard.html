<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>盯盘助手 - 专业版</title>  
<style>  
* { margin: 0; padding: 0; box-sizing: border-box; }  
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }  
.container { max-width: 1400px; margin: 0 auto; }  
.top-banner { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #fff; border: 2px dashed #f0b90b; border-radius: 8px; margin-bottom: 20px; }  
.top-banner .hint { color: #666; font-size: 14px; }  
.top-banner .title { font-size: 24px; color: #f0b90b; font-weight: bold; border: 2px dashed #f0b90b; padding: 5px 20px; }  
.top-banner .logout { color: #666; cursor: pointer; border: 2px dashed #ccc; padding: 5px 15px; }  
.top-banner .logout:hover { border-color: #f0b90b; color: #f0b90b; }  
.info-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }  
.info-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }  
.info-card h3 { font-size: 16px; color: #333; margin-bottom: 15px; border-left: 3px solid #f0b90b; padding-left: 10px; }  
.info-card .content { font-size: 13px; color: #666; line-height: 1.8; }  
.info-card .content .item { padding: 5px 10px; border: 1px dashed #ddd; margin-bottom: 8px; }  
.filter-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }  
.filter-left, .filter-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }  
.filter-bar label { color: #666; font-size: 14px; }  
.filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }  
.filter-bar button { padding: 8px 20px; background: #f0b90b; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }  
.filter-bar button:hover { background: #f5a623; }  
.data-box { background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }  
.data-box .section { margin-bottom: 15px; }  
.data-box .section-title { font-weight: bold; color: #333; margin-bottom: 5px; }  
.data-box .section-content { color: #666; font-size: 14px; line-height: 1.6; }  
.main-content { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }  
.controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }  
.control-card { background: #f9f9f9; border-radius: 8px; padding: 15px; }  
.control-card label { display: block; margin-bottom: 8px; color: #f0b90b; font-weight: bold; }  
.control-card select, .control-card input { width: 100%; padding: 10px; border: 2px solid #f0b90b; border-radius: 6px; font-size: 14px; }  
.current-symbol-display { background: #f0b90b22; border: 2px solid #f0b90b; border-radius: 6px; padding: 8px 12px; margin-top: 10px; font-weight: bold; color: #f0b90b; }  
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }  
.card { background: #f9f9f9; border-radius: 8px; padding: 20px; border: 1px solid #ddd; }  
.card h3 { color: #f0b90b; margin-bottom: 15px; font-size: 16px; }  
.info-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }  
.info-up { color: #0ecb81; font-weight: bold; }  
.info-down { color: #f6465d; font-weight: bold; }  
.log-box { height: 200px; overflow-y: auto; background: #fff; border: 2px solid #f0b90b; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 13px; }  
#login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }  
.login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 90%; }  
.login-box h2 { color: #f0b90b; margin-bottom: 20px; }  
.login-box input { width: 100%; padding: 15px; border: 2px solid #f0b90b; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }  
.login-box button { width: 100%; padding: 15px; background: #f0b90b; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }  
.login-error { color: #f6465d; margin-top: 10px; display: none; }  
@media (max-width: 900px) { .info-cards { grid-template-columns: 1fr; } .main-grid { grid-template-columns: 1fr; } }  
</style>  
</head>  
<body>  
<!-- 登录 -->  
<div id="login-overlay">  
<div class="login-box">  
<h2>🔐 盯盘助手 - 登录</h2>  
<input type="password" id="login-password" placeholder="请输入将军令" onkeypress="if(event.keyCode===13) checkPassword()">  
<button onclick="checkPassword()">进入系统</button>  
<div class="login-error" id="login-error">将军令错误</div>  
</div>  
</div>  
  
<!-- 主内容 -->  
<div class="container" id="main-content" style="display:none">  
<div class="top-banner">  
<div class="hint">💡 开启代理可获得实时数据</div>  
<div class="title">盯盘助手 - 专业版</div>  
<div class="logout" onclick="logout()">退出</div>  
</div>  
<div class="info-cards">  
<div class="info-card">  
<h3>📅 宏观时间轴</h3>  
<div class="content" id="macro-calendar"><div class="item">加载中...</div></div>  
</div>  
<div class="info-card">  
<h3>📰 实时资讯</h3>  
<div class="content" id="realtime-news"><div class="item">加载中...</div></div>  
</div>  
<div class="info-card">  
<h3>🔮 未来 24 小时咨询</h3>  
<div class="content" id="future-events"><div class="item">加载中...</div></div>  
</div>  
</div>  
<div class="filter-bar">  
<div class="filter-left">  
<label>币种：</label>  
<select id="quick-symbol-select" onchange="quickSelect(this.value)">  
<option value="BTCUSDT">BTC</option>  
<option value="ETHUSDT">ETH</option>  
<option value="BNBUSDT">BNB</option>  
</select>  
<label>周期：</label>  
<select id="quick-interval-select">  
<option value="1m">1 分钟</option>  
<option value="5m">5 分钟</option>  
<option value="15m">15 分钟</option>  
<option value="1h">1 小时</option>  
<option value="4h">4 小时</option>  
<option value="1d">日线</option>  
</select>  
<button onclick="searchData()">搜索</button>  
</div>  
<div class="filter-right">  
<label>下载：</label>  
<input type="date" id="download-start">  
<input type="date" id="download-end">  
<button onclick="downloadData()">下载 Excel</button>  
</div>  
</div>  
<div class="data-box">  
<div class="section">  
<div class="section-title">净流入：</div>  
<div class="section-content" id="data-inflow">--</div>  
</div>  
<div class="section">  
<div class="section-title">巨鲸异动：</div>  
<div class="section-content" id="data-whale">--</div>  
</div>  
</div>  
<div class="main-content">  
<div class="controls-grid">  
<div class="control-card">  
<label>🪙 币种</label>  
<input type="text" id="symbol-search" placeholder="搜索币种" onkeypress="if(event.keyCode===13) selectFirstMatch()" style="width:100%;padding:10px;border:2px solid #f0b90b;border-radius:6px;margin-bottom:10px">  
<div class="current-symbol-display">当前：<span id="current-symbol-display">BTC/USDT</span></div>  
<input type="hidden" id="selected-symbol" value="BTCUSDT">  
</div>  
<div class="control-card">  
<label>⏱️ 周期</label>  
<select id="interval-select" onchange="changeInterval()">  
<option value="1m">1 分钟</option>  
<option value="5m">5 分钟</option>  
<option value="15m">15 分钟</option>  
<option value="1h" selected>1 小时</option>  
<option value="4h">4 小时</option>  
<option value="1d">日线</option>  
</select>  
</div>  
</div>  
<div class="main-grid">  
<div class="card">  
<h3>📊 实时行情</h3>  
<div class="info-item">  
<span>当前价格</span>  
<span id="current-price">等待数据...</span>  
</div>  
<div class="info-item">  
<span>24h 涨跌</span>  
<span id="price-change">等待数据...</span>  
</div>  
<div class="info-item">  
<span>状态</span>  
<span id="connection-text">未连接</span>  
</div>  
</div>  
<div class="card">  
<h3>📈 技术指标</h3>  
<div class="info-item">  
<span>RSI(14)</span>  
<span id="rsi-value">计算中...</span>  
</div>  
<div class="info-item">  
<span>MA5</span>  
<span id="ma5">计算中...</span>  
</div>  
</div>  
</div>  
<div class="card">  
<h3>📝 日志</h3>  
<div id="log-container" class="log-box"></div>  
</div>  
</div>  
</div>  
  
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js "></script>  
<script>  
// 变量  
var currentSymbol = 'BTCUSDT';  
var currentInterval = '1h';  
var priceHistory = [];  
var ws = null;  
var isConnected = false;  
var allSymbols = [];  
var searchResults = [];  
var binanceBase = 'https://api.binance.com';  
  
// 密码验证  
function checkPassword() {  
var input = document.getElementById('login-password').value;  
if (input === 'a19880819') {  
localStorage.setItem('authenticated', 'true');  
document.getElementById('login-overlay').style.display = 'none';  
document.getElementById('main-content').style.display = 'block';  
initApp();  
} else {  
document.getElementById('login-error').style.display = 'block';  
}  
}  
  
// 退出  
function logout() {  
localStorage.removeItem('authenticated');  
location.reload();  
}  
  
// 加载币种  
function loadSymbols() {  
allSymbols = [  
{symbol:'BTCUSDT',base:'BTC'},  
{symbol:'ETHUSDT',base:'ETH'},  
{symbol:'BNBUSDT',base:'BNB'},  
{symbol:'XRPUSDT',base:'XRP'},  
{symbol:'SOLUSDT',base:'SOL'},  
{symbol:'LTCUSDT',base:'LTC'},  
{symbol:'STXUSDT',base:'STX'}  
];  
console.log('币种已加载:', allSymbols.length);  
}  
  
// 宏观日历  
function loadMacroCalendar() {  
var now = new Date();  
var mofc = new Date('2026-07-15');  
var cpi = new Date('2026-06-25');  
document.getElementById('macro-calendar').innerHTML =  
'<div class="item">📍 FOMC - 还有' + Math.ceil((mofc-now)/86400000) + '天</div>' +  
'<div class="item">📍 CPI - 还有' + Math.ceil((cpi-now)/86400000) + '天</div>';  
}  
  
// 实时资讯  
function loadRealtimeNews() {  
var now = new Date();  
document.getElementById('realtime-news').innerHTML =  
'<div class="item">📍 [' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + '] 市场波动</div>';  
setTimeout(loadRealtimeNews, 30000);  
}  
  
// 巨鲸  
function loadWhaleAlert() {  
document.getElementById('data-whale').textContent = '暂无异动';  
document.getElementById('data-inflow').textContent = '--';  
}  
  
// 搜索  
function selectFirstMatch() {  
if (searchResults.length > 0) selectSymbol(searchResults[0].symbol);  
}  
  
// 选择币种  
function selectSymbol(symbol) {  
currentSymbol = symbol;  
document.getElementById('selected-symbol').value = symbol;  
document.getElementById('symbol-search').value = symbol.replace('USDT','');  
document.getElementById('current-symbol-display').textContent = symbol.replace('USDT','/USDT');  
document.getElementById('quick-symbol-select').value = symbol;  
priceHistory = [];  
document.getElementById('current-price').textContent = '等待...';  
if (ws) { ws.close(); ws = null; }  
setTimeout(function() {  
connectWebSocket();  
addLog('切换：' + symbol, 'normal');  
}, 100);  
}  
  
function quickSelect(symbol) { selectSymbol(symbol); }  
function searchData() { selectSymbol(document.getElementById('quick-symbol-select').value); }  
function changeInterval() { currentInterval = document.getElementById('interval-select').value; priceHistory = []; }  
  
// WebSocket  
function connectWebSocket() {  
if (ws) { ws.close(); ws = null; }  
try {  
ws = new WebSocket('wss://stream.binance.com:9443/ws/' + currentSymbol.toLowerCase() + '@ticker');  
ws.onopen = function() {  
isConnected = true;  
document.getElementById('connection-text').textContent = '实时连接';  
addLog('已连接：' + currentSymbol, 'normal');  
};  
ws.onmessage = function(event) { updatePrice(JSON.parse(event.data)); };  
ws.onclose = function() { setTimeout(connectWebSocket, 5000); };  
ws.onerror = function() { document.getElementById('connection-text').textContent = '连接失败'; };  
} catch(e) { console.error(e); }  
}  
  
// 更新价格  
function updatePrice(data) {  
var price = parseFloat(data.c).toFixed(2);  
var change = parseFloat(data.P).toFixed(2);  
document.getElementById('current-price').textContent = '$' + price;  
var changeElem = document.getElementById('price-change');  
changeElem.textContent = change + '%';  
changeElem.style.color = change >= 0 ? '#0ecb81' : '#f6465d';  
priceHistory.push(parseFloat(price));  
if (priceHistory.length > 100) priceHistory.shift();  
var rsi = calculateRSI(priceHistory);  
document.getElementById('rsi-value').textContent = rsi.toFixed(2);  
var ma5 = calculateMA(priceHistory, 5);  
document.getElementById('ma5').textContent = '$' + ma5.toFixed(2);  
}  
  
// RSI  
function calculateRSI(prices) {  
if (prices.length < 15) return 50;  
var gains = 0, losses = 0;  
for (var i = prices.length - 14; i < prices.length; i++) {  
var diff = prices[i] - prices[i-1];  
if (diff > 0) gains += diff;  
else losses -= diff;  
}  
var avgGain = gains / 14;  
var avgLoss = losses / 14;  
if (avgLoss === 0) return 100;  
return 100 - (100 / (1 + avgGain / avgLoss));  
}  
  
// MA  
function calculateMA(prices, period) {  
if (prices.length < period) return prices[prices.length-1] || 0;  
var sum = 0;  
for (var i = prices.length - period; i < prices.length; i++) sum += prices[i];  
return sum / period;  
}  
  
// 下载  
function downloadData() {  
var startTime = document.getElementById('download-start').value;  
var endTime = document.getElementById('download-end').value;  
if(!startTime || !endTime) { alert('请选择日期！'); return; }  
  
var startMs = new Date(startTime).getTime();  
var endMs = new Date(endTime).getTime();  
if(startMs >= endMs) { alert('开始时间必须早于结束时间！'); return; }  
  
var interval = document.getElementById('quick-interval-select').value;  
addLog('开始下载 ' + currentSymbol + ' ' + interval, 'normal');  
  
fetchKlines(currentSymbol, interval, startMs, endMs, function(klines) {  
var data = [['时间','开盘','最高','最低','收盘','实体上沿','实体下沿','成交量 (基础币)','成交量 (USDT)','主动买入量','主动卖出量','交易次数']];  
  
klines.forEach(function(k) {  
var open = parseFloat(k[1]);  
var high = parseFloat(k[2]);  
var low = parseFloat(k[3]);  
var close = parseFloat(k[4]);  
var volume = parseFloat(k[5]);  
var quoteVolume = parseFloat(k[7]);  
var takerBuyVolume = parseFloat(k[8]);  
var takerSellVolume = volume - takerBuyVolume;  
var trades = k[9] || 0;  
  
var bodyTop = Math.max(open, close);  
var bodyBottom = Math.min(open, close);  
var time = formatTime(k[0], interval);  
  
data.push([time, open, high, low, close, bodyTop, bodyBottom, volume.toFixed(4), quoteVolume.toFixed(2), takerBuyVolume.toFixed(4), takerSellVolume.toFixed(4), trades]);  
});  
  
var wb = XLSX.utils.book_new();  
var ws = XLSX.utils.aoa_to_sheet(data);  
ws['!cols'] = [{wch:20},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:15},{wch:15},{wch:15},{wch:15},{wch:12}];  
XLSX.utils.book_append_sheet(wb, ws, 'K 线数据');  
XLSX.writeFile(wb, currentSymbol + '_' + interval + '_' + startTime + '.xlsx');  
addLog('下载完成：' + klines.length + '条', 'normal');  
});  
}  
  
// 获取 K 线  
function fetchKlines(symbol, interval, startTime, endTime, callback) {  
var allKlines = [];  
var currentTime = startTime;  
  
function fetchBatch() {  
if(currentTime >= endTime) { callback(allKlines); return; }  
  
var url = binanceBase + '/api/v3/klines?symbol=' + symbol + '&interval=' + interval + '&startTime=' + currentTime + '&endTime=' + endTime + '&limit=1000';  
  
fetch(url).then(function(r) { return r.json(); })  
.then(function(data) {  
if(data.length === 0) { callback(allKlines); return; }  
allKlines = allKlines.concat(data);  
currentTime = data[data.length-1][0] + 1;  
setTimeout(fetchBatch, 100);  
})  
.catch(function(e) { console.error(e); callback(allKlines); });  
}  
fetchBatch();  
}  
  
// 格式化时间  
function formatTime(timestamp, interval) {  
var date = new Date(timestamp);  
var y = date.getFullYear();  
var m = String(date.getMonth() + 1).padStart(2, '0');  
var d = String(date.getDate()).padStart(2, '0');  
var h = String(date.getHours()).padStart(2, '0');  
var min = String(date.getMinutes()).padStart(2, '0');  
  
switch(interval) {  
case '1m': case '5m': case '15m': case '30m': return y + '-' + m + '-' + d + ' ' + h + ':' + min;  
case '1h': case '4h': return y + '-' + m + '-' + d + ' ' + h + ':00';  
case '1d': return y + '-' + m + '-' + d;  
default: return y + '-' + m + '-' + d + ' ' + h + ':' + min;  
}  
}  
  
// 日志  
function addLog(msg, type) {  
var c = document.getElementById('log-container');  
var t = new Date().toLocaleTimeString();  
var item = document.createElement('div');  
item.textContent = '[' + t + '] ' + msg;  
item.style.padding = '5px 0';  
item.style.borderBottom = '1px solid #eee';  
c.insertBefore(item, c.firstChild);  
}  
  
// 初始化  
function initApp() {  
console.log('初始化...');  
loadSymbols();  
connectWebSocket();  
loadMacroCalendar();  
loadRealtimeNews();  
loadWhaleAlert();  
addLog('系统启动', 'normal');  
}  
  
// 检查登录  
if(localStorage.getItem('authenticated') === 'true') {  
document.getElementById('login-overlay').style.display = 'none';  
document.getElementById('main-content').style.display = 'block';  
initApp();  
}  
</script>  
</body>  
</html>
