    <script>
        // ================================================================
        //  1. 配置 & 状态
        // ================================================================

        const SYMBOL_MAP = {
            'BTCUSDT': { label: 'BTC/USDT', decimals: 2 },
            'BNBUSDT': { label: 'BNB/USDT', decimals: 2 },
            'ETHUSDT': { label: 'ETH/USDT', decimals: 2 },
        };

        const PERIOD_MAP = {
            '5m': '5m',
            '15m': '15m',
            '30m': '30m',
            '1h': '1h',
            '4h': '4h',
            '1d': '1d',
            '1w': '1w'
        };

        const state = {
            symbol: 'BTCUSDT',
            period: '5m',
            startDate: null,
            endDate: null,
            rawKlines: [], // 从币安获取的K线数据
            trades: [], // 从币安获取的逐笔成交
            aggregated: [], // 聚合后的数据（含买卖量）
        };

        // ================================================================
        //  2. Binance API 调用
        // ================================================================

        const BINANCE_BASE = 'https://api.binance.com';

        /**
         * 获取K线数据
         */
        async function fetchKlines(symbol, interval, startTime, endTime, limit = 500) {
            const params = new URLSearchParams({
                symbol: symbol,
                interval: interval,
                limit: limit,
            });
            if (startTime) params.append('startTime', startTime);
            if (endTime) params.append('endTime', endTime);

            const url = `${BINANCE_BASE}/api/v3/klines?${params.toString()}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`K线请求失败: ${resp.status}`);
            const data = await resp.json();
            return data.map(k => ({
                time: new Date(k[0]),
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4]),
                volume: parseFloat(k[5]),
            }));
        }

        /**
         * 获取逐笔成交（最多1000条）
         */
        async function fetchTrades(symbol, limit = 1000) {
            const url = `${BINANCE_BASE}/api/v3/trades?symbol=${symbol}&limit=${limit}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Trades请求失败: ${resp.status}`);
            const data = await resp.json();
            return data.map(t => ({
                time: new Date(t.time),
                price: parseFloat(t.price),
                qty: parseFloat(t.qty),
                isBuyerMaker: t.isBuyerMaker, // true: 买方是maker（taker卖出），false: 买方是taker（买入）
            }));
        }

        // ================================================================
        //  3. 数据聚合（将K线与trades结合，计算买卖量）
        // ================================================================

        /**
         * 将K线数据与trades聚合，生成包含买入/卖出量的数据集
         */
        function aggregateWithTrades(klines, trades) {
            if (!klines || klines.length === 0) return [];

            // 按时间排序
            const sortedKlines = klines.sort((a, b) => a.time - b.time);

            // 构建时间桶映射：每个K线的时间起点作为key
            const buckets = sortedKlines.map(k => ({
                time: k.time,
                open: k.open,
                high: k.high,
                low: k.low,
                close: k.close,
                volume: k.volume,
                buyVolume: 0,
                sellVolume: 0,
            }));

            // 如果有trades，按时间分配到各桶
            if (trades && trades.length > 0) {
                const sortedTrades = trades.sort((a, b) => a.time - b.time);

                // 为每个桶计算买卖量
                for (let i = 0; i < buckets.length; i++) {
                    const bucketStart = buckets[i].time.getTime();
                    const nextBucketStart = (i < buckets.length - 1) ? buckets[i + 1].time.getTime() : Infinity;

                    // 收集该时间区间内的所有trades
                    let buySum = 0,
                        sellSum = 0;
                    for (const t of sortedTrades) {
                        const ts = t.time.getTime();
                        if (ts >= bucketStart && ts < nextBucketStart) {
                            if (t.isBuyerMaker) {
                                // buyer is maker => taker is seller => 卖出
                                sellSum += t.qty;
                            } else {
                                // buyer is taker => 买入
                                buySum += t.qty;
                            }
                        }
                    }
                    buckets[i].buyVolume = buySum;
                    buckets[i].sellVolume = sellSum;
                }

                // 检查总买卖量是否与总成交量接近，若差距过大，按比例调整
                const totalVolume = buckets.reduce((s, b) => s + b.volume, 0);
                const totalTradeVolume = buckets.reduce((s, b) => s + b.buyVolume + b.sellVolume, 0);
                if (totalTradeVolume > 0 && Math.abs(totalVolume - totalTradeVolume) / totalVolume > 0.3) {
                    // 如果trades覆盖不够，用成交量比例缩放
                    const ratio = totalVolume / totalTradeVolume;
                    buckets.forEach(b => {
                        b.buyVolume = Math.round(b.buyVolume * ratio);
                        b.sellVolume = Math.round(b.sellVolume * ratio);
                    });
                }
            } else {
                // 无trades，基于涨跌模拟买卖量（占位）
                buckets.forEach(b => {
                    const change = b.close - b.open;
                    const total = b.volume;
                    if (change >= 0) {
                        b.buyVolume = Math.round(total * (0.6 + 0.2 * Math.random()));
                        b.sellVolume = total - b.buyVolume;
                    } else {
                        b.sellVolume = Math.round(total * (0.6 + 0.2 * Math.random()));
                        b.buyVolume = total - b.sellVolume;
                    }
                });
            }

            return buckets;
        }

        // ================================================================
        //  4. 图表渲染（与之前类似，但适配新数据结构）
        // ================================================================

        let mainChart = null,
            subChart = null;

        function initCharts() {
            mainChart = echarts.init(document.getElementById('mainChart'), 'dark');
            subChart = echarts.init(document.getElementById('subChart'), 'dark');
            window.addEventListener('resize', () => {
                mainChart && mainChart.resize();
                subChart && subChart.resize();
            });
        }

        function renderCharts(data, symbol) {
            if (!mainChart || !subChart) return;
            if (!data || data.length === 0) {
                mainChart.clear();
                subChart.clear();
                updateStats(null, symbol);
                return;
            }

            const cfg = SYMBOL_MAP[symbol] || { decimals: 2 };
            const dec = cfg.decimals;

            const times = data.map(d => d.time);
            const opens = data.map(d => d.open);
            const highs = data.map(d => d.high);
            const lows = data.map(d => d.low);
            const closes = data.map(d => d.close);
            const volumes = data.map(d => d.volume);
            const buyVols = data.map(d => d.buyVolume || 0);
            const sellVols = data.map(d => d.sellVolume || 0);

            // ---- 主图 ----
            const optionMain = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(11,17,26,0.92)',
                    borderColor: '#2a3340',
                    borderWidth: 1,
                    textStyle: { color: '#e0e4ec', fontSize: 12 },
                    formatter: function(params) {
                        const idx = params[0]?.dataIndex;
                        if (idx === undefined) return '';
                        const d = data[idx];
                        const buy = d.buyVolume ? d.buyVolume.toLocaleString() : '--';
                        const sell = d.sellVolume ? d.sellVolume.toLocaleString() : '--';
                        const total = d.volume.toLocaleString();
                        const timeStr = d.time.toLocaleString('zh-CN', { hour12: false });
                        return `
                            <strong>${timeStr}</strong><br/>
                            开: ${d.open.toFixed(dec)} &nbsp; 高: ${d.high.toFixed(dec)}<br/>
                            低: ${d.low.toFixed(dec)} &nbsp; 收: ${d.close.toFixed(dec)}<br/>
                            成交量: ${total}<br/>
                            <span style="color:#2ecc71;">▲ 买入: ${buy}</span> &nbsp;
                            <span style="color:#e74c3c;">▼ 卖出: ${sell}</span>
                        `;
                    }
                },
                legend: {
                    data: ['价格', '成交量'],
                    textStyle: { color: '#8ea4c0', fontSize: 11 },
                    top: 6,
                    right: 16,
                    icon: 'roundRect',
                    itemWidth: 14,
                    itemHeight: 4,
                },
                grid: { left: 48, right: 16, top: 44, bottom: 32 },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: '#1f2a36' } },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: function(value, idx) {
                            const d = new Date(value);
                            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit',
                                minute: '2-digit' });
                        },
                        interval: Math.max(1, Math.floor(data.length / 40)),
                    },
                    splitLine: { show: false },
                    axisTick: { show: false },
                },
                yAxis: [{
                    type: 'value',
                    scale: true,
                    position: 'left',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: (v) => v.toFixed(dec),
                    },
                    splitLine: { lineStyle: { color: '#1a2330', type: 'dashed' } },
                }, {
                    type: 'value',
                    scale: true,
                    position: 'right',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: { show: false },
                }],
                series: [{
                    name: '价格',
                    type: 'candlestick',
                    data: data.map(d => [d.open, d.close, d.low, d.high]),
                    itemStyle: {
                        color: '#2ecc71',
                        color0: '#e74c3c',
                        borderColor: '#2ecc71',
                        borderColor0: '#e74c3c',
                        borderWidth: 1,
                    },
                    markLine: {
                        silent: true,
                        symbol: 'none',
                        lineStyle: { color: '#f7931a', type: 'dashed', width: 1 },
                        label: {
                            color: '#f7931a',
                            fontSize: 10,
                            formatter: (p) => p.value.toFixed(dec),
                            position: 'insideEndTop',
                        },
                        data: [{ type: 'average', name: '均价' }],
                    },
                }, {
                    name: '成交量',
                    type: 'bar',
                    yAxisIndex: 1,
                    data: volumes,
                    itemStyle: {
                        color: function(params) {
                            const idx = params.dataIndex;
                            if (idx === undefined) return '#2a7de1';
                            const d = data[idx];
                            return d.close >= d.open ? 'rgba(46,204,113,0.55)' : 'rgba(231,76,60,0.55)';
                        },
                        borderRadius: [1, 1, 0, 0],
                    },
                    barWidth: '50%',
                    z: 1,
                }, ],
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100,
                    minSpan: 5,
                }, {
                    type: 'slider',
                    start: 0,
                    end: 100,
                    height: 18,
                    bottom: 2,
                    borderColor: '#1f2a36',
                    backgroundColor: '#0f1822',
                    fillerColor: 'rgba(42,125,225,0.15)',
                    handleStyle: { color: '#2a7de1' },
                    textStyle: { color: '#6a82a0', fontSize: 9 },
                }, ],
                animation: false,
            };

            mainChart.setOption(optionMain, true);

            // ---- 副图：订单流（买卖差 + 累积） ----
            const diffs = data.map(d => (d.buyVolume || 0) - (d.sellVolume || 0));
            const cumDiffs = [];
            let cum = 0;
            for (const v of diffs) {
                cum += v;
                cumDiffs.push(cum);
            }

            const optionSub = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(11,17,26,0.92)',
                    borderColor: '#2a3340',
                    borderWidth: 1,
                    textStyle: { color: '#e0e4ec', fontSize: 12 },
                    formatter: function(params) {
                        const idx = params[0]?.dataIndex;
                        if (idx === undefined) return '';
                        const d = data[idx];
                        const buy = d.buyVolume ? d.buyVolume.toLocaleString() : '--';
                        const sell = d.sellVolume ? d.sellVolume.toLocaleString() : '--';
                        const diff = (d.buyVolume || 0) - (d.sellVolume || 0);
                        const cumVal = cumDiffs[idx];
                        return `
                            ${d.time.toLocaleString('zh-CN', { hour12: false })}<br/>
                            <span style="color:#2ecc71;">买入: ${buy}</span><br/>
                            <span style="color:#e74c3c;">卖出: ${sell}</span><br/>
                            净差: <strong>${diff > 0 ? '+' : ''}${diff.toLocaleString()}</strong><br/>
                            累积净差: <strong>${cumVal.toLocaleString()}</strong>
                        `;
                    }
                },
                legend: {
                    data: ['净买卖差', '累积净差'],
                    textStyle: { color: '#8ea4c0', fontSize: 11 },
                    top: 4,
                    right: 16,
                    icon: 'roundRect',
                    itemWidth: 14,
                    itemHeight: 4,
                },
                grid: { left: 48, right: 16, top: 32, bottom: 20 },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: '#1f2a36' } },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: function(value, idx) {
                            const d = new Date(value);
                            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit',
                                minute: '2-digit' });
                        },
                        interval: Math.max(1, Math.floor(data.length / 40)),
                    },
                    splitLine: { show: false },
                    axisTick: { show: false },
                },
                yAxis: [{
                    type: 'value',
                    scale: true,
                    position: 'left',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: { lineStyle: { color: '#1a2330', type: 'dashed' } },
                }, {
                    type: 'value',
                    scale: true,
                    position: 'right',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: { show: false },
                }],
                series: [{
                    name: '净买卖差',
                    type: 'bar',
                    data: diffs,
                    itemStyle: {
                        color: function(params) {
                            const val = params.value;
                            return val >= 0 ? 'rgba(46,204,113,0.7)' : 'rgba(231,76,60,0.7)';
                        },
                        borderRadius: [1, 1, 0, 0],
                    },
                    barWidth: '40%',
                }, {
                    name: '累积净差',
                    type: 'line',
                    yAxisIndex: 1,
                    data: cumDiffs,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { color: '#f39c12', width: 2 },
                    areaStyle: { color: 'rgba(243,156,18,0.08)' },
                }, ],
                animation: false,
            };

            subChart.setOption(optionSub, true);
            updateStats(data, symbol);
        }

        // ================================================================
        //  5. 统计更新
        // ================================================================

        function updateStats(data, symbol) {
            if (!data || data.length === 0) {
                ['Open', 'High', 'Low', 'Close', 'Volume', 'Change', 'Points'].forEach(id => {
                    document.getElementById('stat' + id).textContent = '--';
                });
                return;
            }
            const cfg = SYMBOL_MAP[symbol] || { decimals: 2 };
            const dec = cfg.decimals;
            const first = data[0];
            const last = data[data.length - 1];
            const high = Math.max(...data.map(d => d.high));
            const low = Math.min(...data.map(d => d.low));
            const totalVol = data.reduce((s, d) => s + d.volume, 0);
            const change = ((last.close - first.open) / first.open * 100);

            document.getElementById('statOpen').textContent = first.open.toFixed(dec);
            document.getElementById('statHigh').textContent = high.toFixed(dec);
            document.getElementById('statLow').textContent = low.toFixed(dec);
            document.getElementById('statClose').textContent = last.close.toFixed(dec);
            document.getElementById('statVolume').textContent = totalVol.toLocaleString();
            document.getElementById('statPoints').textContent = data.length;

            const changeEl = document.getElementById('statChange');
            changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            changeEl.className = 'stat-value ' + (change >= 0 ? 'green' : 'red');
        }

        // ================================================================
        //  6. 核心加载逻辑（从Binance获取真实数据）
        // ================================================================

        async function loadData() {
            const symbol = state.symbol;
            const period = state.period;
            const startDate = state.startDate;
            const endDate = state.endDate;

            const loadingMask = document.getElementById('loadingMask');
            const errorMsg = document.getElementById('errorMsg');
            loadingMask.style.display = 'flex';
            errorMsg.style.display = 'none';

            try {
                // 1. 获取K线
                const startMs = startDate ? startDate.getTime() : undefined;
                const endMs = endDate ? endDate.getTime() : undefined;

                // 限制最大条数，避免请求过多
                let limit = 500;
                let klines = await fetchKlines(symbol, period, startMs, endMs, limit);

                // 如果数据为空或太少，尝试增大limit
                if (klines.length < 10) {
                    klines = await fetchKlines(symbol, period, startMs, endMs, 1000);
                }

                if (!klines || klines.length === 0) {
                    throw new Error('未获取到K线数据，请检查币种或时间范围。');
                }

                // 2. 获取trades（最近1000条，用于买卖方向）
                let trades = [];
                try {
                    trades = await fetchTrades(symbol, 1000);
                } catch (e) {
                    console.warn('获取trades失败，将使用模拟买卖量', e);
                    trades = [];
                }

                // 3. 聚合
                const aggregated = aggregateWithTrades(klines, trades);
                state.aggregated = aggregated;

                // 4. 渲染
                renderCharts(aggregated, symbol);

            } catch (err) {
                console.error(err);
                errorMsg.textContent = '⚠️ ' + err.message;
                errorMsg.style.display = 'block';
                mainChart.clear();
                subChart.clear();
                updateStats(null, symbol);
            } finally {
                loadingMask.style.display = 'none';
            }
        }

        // ================================================================
        //  7. UI 事件绑定
        // ================================================================

        function bindEvents() {
            // 币种
            document.querySelectorAll('#symbolGroup .btn-symbol').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#symbolGroup .btn-symbol').forEach(b => b.classList.remove(
                    'active'));
                    this.classList.add('active');
                    state.symbol = this.dataset.symbol;
                    loadData();
                });
            });

            // 周期
            document.querySelectorAll('#periodGroup .btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#periodGroup .btn').forEach(b => b.classList.remove(
                    'active'));
                    this.classList.add('active');
                    state.period = this.dataset.period;
                    loadData();
                });
            });

            // 自定义时间
            const startInput = document.getElementById('startTime');
            const endInput = document.getElementById('endTime');
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            now.setSeconds(0, 0);
            sevenDaysAgo.setSeconds(0, 0);
            startInput.value = formatDatetimeLocal(sevenDaysAgo);
            endInput.value = formatDatetimeLocal(now);

            document.getElementById('applyCustom').addEventListener('click', function() {
                const startVal = startInput.value;
                const endVal = endInput.value;
                state.startDate = startVal ? new Date(startVal) : null;
                state.endDate = endVal ? new Date(endVal) : null;
                if (state.startDate && state.endDate && state.startDate > state.endDate) {
                    [state.startDate, state.endDate] = [state.endDate, state.startDate];
                }
                loadData();
            });

            // 回车触发
            startInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById(
                    'applyCustom').click(); });
            endInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById(
                    'applyCustom').click(); });
        }

        function formatDatetimeLocal(date) {
            const pad = (n) => String(n).padStart(2, '0');
            const y = date.getFullYear();
            const mo = pad(date.getMonth() + 1);
            const d = pad(date.getDate());
            const h = pad(date.getHours());
            const mi = pad(date.getMinutes());
            return `${y}-${mo}-${d}T${h}:${mi}`;
        }

        // ================================================================
        //  8. 启动
        // ================================================================

        function init() {
            initCharts();
            bindEvents();
            // 默认加载BTC 5分钟
            loadData();
        }

        window.addEventListener('load', init);
        // 暴露调试
        window.__refresh = loadData;
        window.__state = state;
        console.log('📊 真实订单流已启动 (Binance)');
    </script>

</body>
