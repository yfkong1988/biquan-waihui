<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📊 订单流可视化 - 实时模拟</title>
    <!-- 引入 ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 暗色主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e4ec;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-wrapper {
            max-width: 1500px;
            width: 100%;
            background: #131a24;
            border-radius: 24px;
            padding: 28px 30px 30px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a3340;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #f7931a, #f0b34b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area .badge {
            background: #1f2a36;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: #8ea4c0;
            border: 1px solid #2d3a4a;
            font-weight: 500;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a2330;
            padding: 4px 6px;
            border-radius: 40px;
            border: 1px solid #293542;
        }

        .control-group .label {
            font-size: 11px;
            font-weight: 600;
            color: #7a92b0;
            padding: 0 8px 0 10px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            border: none;
            color: #8ea4c0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn:hover {
            background: #263240;
            color: #d0dcec;
        }

        .btn.active {
            background: #f7931a;
            color: #0b0e14;
            box-shadow: 0 4px 14px rgba(247, 147, 26, 0.25);
        }

        .btn.active:hover {
            background: #f8a43a;
        }

        .btn-symbol {
            padding: 6px 16px;
            font-weight: 600;
        }

        .btn-symbol.active {
            background: #2a7de1;
            box-shadow: 0 4px 14px rgba(42, 125, 225, 0.25);
        }

        .btn-symbol.active:hover {
            background: #3e8ef0;
        }

        .custom-time-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a2330;
            padding: 4px 10px 4px 14px;
            border-radius: 40px;
            border: 1px solid #293542;
        }

        .custom-time-group input[type="datetime-local"] {
            background: #0f1822;
            border: 1px solid #293542;
            border-radius: 20px;
            padding: 5px 10px;
            color: #d0dcec;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            width: 140px;
        }

        .custom-time-group input[type="datetime-local"]:focus {
            border-color: #f7931a;
        }

        .custom-time-group .btn-apply {
            background: #f7931a;
            color: #0b0e14;
            padding: 4px 16px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .custom-time-group .btn-apply:hover {
            background: #f8a43a;
        }

        /* ===== 图表容器 ===== */
        .chart-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            background: #0f1822;
            border-radius: 16px;
            padding: 6px;
            border: 1px solid #1f2a36;
        }

        #mainChart {
            width: 100%;
            height: 480px;
            border-radius: 12px;
            background: #0b111a;
        }

        #subChart {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            background: #0b111a;
        }

        /* ===== 统计信息栏 ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 14px 20px;
            background: #0f1822;
            border-radius: 16px;
            border: 1px solid #1f2a36;
            gap: 12px;
        }

        .stats-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 13px;
        }

        .stats-item .stat-label {
            color: #7a92b0;
            font-weight: 400;
        }

        .stats-item .stat-value {
            font-weight: 600;
            color: #e0e4ec;
            font-variant-numeric: tabular-nums;
        }

        .stats-item .stat-value.green {
            color: #2ecc71;
        }
        .stats-item .stat-value.red {
            color: #e74c3c;
        }
        .stats-item .stat-value.orange {
            color: #f39c12;
        }

        .stats-divider {
            width: 1px;
            height: 28px;
            background: #1f2a36;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1100px) {
            .app-wrapper {
                padding: 18px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .controls {
                flex-wrap: wrap;
            }
            .control-group {
                flex-wrap: wrap;
            }
            #mainChart {
                height: 360px;
            }
            #subChart {
                height: 120px;
            }
            .custom-time-group input[type="datetime-local"] {
                width: 110px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .app-wrapper {
                padding: 12px;
            }
            .logo-area h1 {
                font-size: 18px;
            }
            .btn {
                font-size: 11px;
                padding: 4px 10px;
            }
            .stats-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .stats-divider {
                display: none;
            }
            #mainChart {
                height: 280px;
            }
            #subChart {
                height: 90px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b111a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3a4a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3d4a5a;
        }

        /* loading shimmer */
        .loading-shimmer {
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- ===== 头部：Logo + 控制栏 ===== -->
        <div class="header">
            <div class="logo-area">
                <h1>📊 OrderFlow</h1>
                <span class="badge">实时模拟 · 订单流</span>
            </div>
            <div class="controls">

        <!-- ===== 图表区域 ===== -->
        <div class="chart-container">
            <div id="mainChart"></div>
            <div id="subChart"></div>
        </div>

        <!-- ===== 统计信息栏 ===== -->
        <div class="stats-bar" id="statsBar">
            <div class="stats-item">
                <span class="stat-label">开盘</span>
                <span class="stat-value" id="statOpen">--</span>
            </div>
            <div class="stats-divider"></div>
            <div class="stats-item">
                <span class="stat-label">最高</span>

            </div>
            <div class="stats-divider"></div>
            <div class="stats-item">
                <span class="stat-label">最低</span>
                <span class="stat-value" id="statLow">--</span>
            </div>
            <div class="stats-divider"></div>
            <div class="stats-item">
                <span class="stat-label">收盘</span>
                <span class="stat-value" id="statClose">--</span>
            </div>
            <div class="stats-divider"></div>
            <div class="stats-item">

    <script>
        // ================================================================
        //  1. 配置 & 状态
        // ================================================================

        const CONFIG = {
            BTC: { base: 30250, vol: 0.018, label: 'BTC/USDT', decimals: 2 },
            BNB: { base: 315, vol: 0.025, label: 'BNB/USDT', decimals: 2 },
            REUSDT: { base: 1.023, vol: 0.008, label: 'REUSDT', decimals: 4 },
        };

        const PERIOD_MAP = {
            '5m': 5,
            '15m': 15,
            '30m': 30,
            '1h': 60,
            '4h': 240,
            '1d': 1440,
            '1w': 10080,
        };

        const state = {
            symbol: 'BTC',
            period: '5m',
            startDate: null, // Date 对象
            endDate: null, // Date 对象
            rawData: [], // 分钟级原始数据
            aggregated: [], // 聚合后的数据
        };

        // ================================================================
        //  2. 数据生成器（模拟真实订单流）
        // ================================================================

        /**
         * 生成分钟级 OHLCV 数据，包含买卖方向
         * @param {string} symbol 币种
         * @param {number} days 生成天数
         * @returns {Array} 数据数组
         */
        function generateMinuteData(symbol, days = 30) {
            const cfg = CONFIG[symbol];
            const totalMinutes = days * 24 * 60;
            const now = new Date();
            // 对齐到整分钟
            now.setSeconds(0, 0);

            const data = [];
            let price = cfg.base;
            let trend = 0;

            for (let i = totalMinutes - 1; i >= 0; i--) {
                const t = new Date(now.getTime() - i * 60 * 1000);

                // 随机游走 + 趋势 + 均值回归
                const drift = (cfg.base - price) * 0.00008;
                const noise = (Math.random() - 0.5) * cfg.vol * price * 1.2;
                // 加入小幅趋势
                trend += (Math.random() - 0.495) * 0.0006;
                trend = Math.max(-0.005, Math.min(0.005, trend));

                const change = drift + noise + trend * price;
                const open = price;
                const close = price + change;
                // 生成高低价
                const high = Math.max(open, close) + Math.random() * cfg.vol * price * 0.6;
                const low = Math.min(open, close) - Math.random() * cfg.vol * price * 0.6;

                price = close;

                // 成交量：与波动率正相关 + 随机
                const volBase = 100 + Math.random() * 200;
                const volFactor = 1 + Math.abs(change) / (cfg.vol * price * 2);
                const volume = Math.round(volBase * volFactor * (0.6 + Math.random() * 0.8));

                // 买卖方向：根据价格变化方向 + 随机
                const buyRatio = 0.45 + 0.3 * (change > 0 ? 1 : -1) * Math.min(1, Math.abs(change) / (cfg.vol * price));
                const buyVolume = Math.round(volume * Math.max(0.1, Math.min(0.9, buyRatio)));
                const sellVolume = volume - buyVolume;

                data.push({
                    time: t,
                    open: Number(open.toFixed(6)),
                    high: Number(high.toFixed(6)),
                    low: Number(low.toFixed(6)),
                    close: Number(close.toFixed(6)),
                    volume: volume,
                    buyVolume: buyVolume,
                    sellVolume: sellVolume,
                });
            }

            // 按时间升序
            data.sort((a, b) => a.time - b.time);
            return data;
        }

        // ================================================================
        //  3. 数据聚合器
        // ================================================================

        /**
         * 将分钟数据聚合为指定周期
         */
        function aggregateData(minuteData, periodMinutes) {
            if (!minuteData || minuteData.length === 0) return [];

            const result = [];
            let bucket = null;
            let bucketTime = null;

            for (const d of minuteData) {
                const ts = d.time.getTime();
                // 计算该数据点所属的 bucket 起始时间
                const bucketStart = new Date(Math.floor(ts / (periodMinutes * 60 * 1000)) * (periodMinutes * 60 * 1000));

                if (!bucketTime || bucketStart.getTime() !== bucketTime.getTime()) {
                    // 保存上一个 bucket
                    if (bucket) {
                        result.push(bucket);
                    }
                    bucketTime = bucketStart;
                    bucket = {
                        time: new Date(bucketStart),
                        open: d.open,
                        high: d.high,
                        low: d.low,
                        close: d.close,
                        volume: d.volume,
                        buyVolume: d.buyVolume,
                        sellVolume: d.sellVolume,
                        count: 1,
                    };
                } else {
                    // 更新当前 bucket
                    bucket.high = Math.max(bucket.high, d.high);
                    bucket.low = Math.min(bucket.low, d.low);
                    bucket.close = d.close;
                    bucket.volume += d.volume;
                    bucket.buyVolume += d.buyVolume;
                    bucket.sellVolume += d.sellVolume;
                    bucket.count += 1;
                }
            }

            if (bucket) {
                result.push(bucket);
            }

            return result;
        }

        /**
         * 根据时间范围过滤数据
         */
        function filterDataByTime(data, startDate, endDate) {
            if (!startDate && !endDate) return data;
            const startTs = startDate ? startDate.getTime() : -Infinity;
            const endTs = endDate ? endDate.getTime() : Infinity;
            return data.filter(d => {
                const ts = d.time.getTime();
                return ts >= startTs && ts <= endTs;
            });
        }

        // ================================================================
        //  4. 图表渲染器 (ECharts)
        // ================================================================

        let mainChart = null;
        let subChart = null;

        function initCharts() {
            mainChart = echarts.init(document.getElementById('mainChart'), 'dark');
            subChart = echarts.init(document.getElementById('subChart'), 'dark');

            // 自适应
            window.addEventListener('resize', () => {
                mainChart && mainChart.resize();
                subChart && subChart.resize();
            });
        }

        /**
         * 渲染主图 + 副图
         */
        function renderCharts(data, symbol) {
            if (!mainChart || !subChart) return;
            if (!data || data.length === 0) {
                mainChart.clear();
                subChart.clear();
                updateStats(null, symbol);
                return;
            }

            const cfg = CONFIG[symbol];
            const decimals = cfg.decimals;

            // ---- 准备数据 ----
            const times = data.map(d => d.time);
            const opens = data.map(d => d.open);
            const highs = data.map(d => d.high);
            const lows = data.map(d => d.low);
            const closes = data.map(d => d.close);
            const volumes = data.map(d => d.volume);
            const buyVols = data.map(d => d.buyVolume);
            const sellVols = data.map(d => d.sellVolume);

            // ---- 主图：K线 + 成交量柱 ----
            const optionMain = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(11,17,26,0.92)',
                    borderColor: '#2a3340',
                    borderWidth: 1,
                    textStyle: { color: '#e0e4ec', fontSize: 12 },
                    formatter: function(params) {
                        const idx = params[0]?.dataIndex;
                        if (idx === undefined) return '';
                        const d = data[idx];
                        const buy = d.buyVolume.toLocaleString();
                        const sell = d.sellVolume.toLocaleString();
                        const total = d.volume.toLocaleString();
                        const timeStr = d.time.toLocaleString('zh-CN', { hour12: false });
                        return `
                            <strong>${timeStr}</strong><br/>
                            开: ${d.open.toFixed(decimals)} &nbsp; 高: ${d.high.toFixed(decimals)}<br/>
                            低: ${d.low.toFixed(decimals)} &nbsp; 收: ${d.close.toFixed(decimals)}<br/>
                            成交量: ${total}<br/>
                            <span style="color:#2ecc71;">▲ 买入: ${buy}</span> &nbsp;
                            <span style="color:#e74c3c;">▼ 卖出: ${sell}</span>
                        `;
                    }
                },
                legend: {
                    data: ['价格', '成交量'],
                    textStyle: { color: '#8ea4c0', fontSize: 11 },
                    top: 6,
                    right: 16,
                    icon: 'roundRect',
                    itemWidth: 14,
                    itemHeight: 4,
                },
                grid: {
                    left: 48,
                    right: 16,
                    top: 44,
                    bottom: 32,
                },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: '#1f2a36' } },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: function(value, idx) {
                            const d = new Date(value);
                            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit',
                                minute: '2-digit' });
                        },
                        interval: Math.max(1, Math.floor(data.length / 40)),
                    },
                    splitLine: { show: false },
                    axisTick: { show: false },
                },
                yAxis: [{
                    type: 'value',
                    scale: true,
                    position: 'left',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: (v) => v.toFixed(decimals),
                    },
                    splitLine: {
                        lineStyle: { color: '#1a2330', type: 'dashed' },
                    },
                }, {
                    type: 'value',
                    scale: true,
                    position: 'right',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 10,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: { show: false },
                }],
                series: [{
                    name: '价格',
                    type: 'candlestick',
                    data: data.map(d => [d.open, d.close, d.low, d.high]),
                    itemStyle: {
                        color: '#2ecc71',
                        color0: '#e74c3c',
                        borderColor: '#2ecc71',
                        borderColor0: '#e74c3c',
                        borderWidth: 1,
                    },
                    markLine: {
                        silent: true,
                        symbol: 'none',
                        lineStyle: { color: '#f7931a', type: 'dashed', width: 1 },
                        label: {
                            color: '#f7931a',
                            fontSize: 10,
                            formatter: (p) => p.value.toFixed(decimals),
                            position: 'insideEndTop',
                        },
                        data: [{
                            type: 'average',
                            name: '均价',
                        }],
                    },
                }, {
                    name: '成交量',
                    type: 'bar',
                    yAxisIndex: 1,
                    data: volumes,
                    itemStyle: {
                        color: function(params) {
                            const idx = params.dataIndex;
                            if (idx === undefined) return '#2a7de1';
                            const d = data[idx];
                            return d.close >= d.open ? 'rgba(46,204,113,0.55)' : 'rgba(231,76,60,0.55)';
                        },
                        borderRadius: [1, 1, 0, 0],
                    },
                    barWidth: '50%',
                    z: 1,
                }, ],
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100,
                    minSpan: 5,
                }, {
                    type: 'slider',
                    start: 0,
                    end: 100,
                    height: 18,
                    bottom: 2,
                    borderColor: '#1f2a36',
                    backgroundColor: '#0f1822',
                    fillerColor: 'rgba(42,125,225,0.15)',
                    handleStyle: { color: '#2a7de1' },
                    textStyle: { color: '#6a82a0', fontSize: 9 },
                }, ],
                animation: false,
            };

            mainChart.setOption(optionMain, true);

            // ---- 副图：订单流（买卖差 + 累积） ----
            const diffs = data.map(d => d.buyVolume - d.sellVolume);
            const cumDiffs = [];
            let cum = 0;
            for (const v of diffs) {
                cum += v;
                cumDiffs.push(cum);
            }

            const optionSub = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(11,17,26,0.92)',
                    borderColor: '#2a3340',
                    borderWidth: 1,
                    textStyle: { color: '#e0e4ec', fontSize: 12 },
                    formatter: function(params) {
                        const idx = params[0]?.dataIndex;
                        if (idx === undefined) return '';
                        const d = data[idx];
                        const diff = d.buyVolume - d.sellVolume;
                        const cumVal = cumDiffs[idx];
                        return `
                            ${d.time.toLocaleString('zh-CN', { hour12: false })}<br/>
                            <span style="color:#2ecc71;">买入: ${d.buyVolume.toLocaleString()}</span><br/>
                            <span style="color:#e74c3c;">卖出: ${d.sellVolume.toLocaleString()}</span><br/>
                            净差: <strong>${diff > 0 ? '+' : ''}${diff.toLocaleString()}</strong><br/>
                            累积净差: <strong>${cumVal.toLocaleString()}</strong>
                        `;
                    }
                },
                legend: {
                    data: ['净买卖差', '累积净差'],
                    textStyle: { color: '#8ea4c0', fontSize: 11 },
                    top: 4,
                    right: 16,
                    icon: 'roundRect',
                    itemWidth: 14,
                    itemHeight: 4,
                },
                grid: {
                    left: 48,
                    right: 16,
                    top: 32,
                    bottom: 20,
                },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: '#1f2a36' } },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: function(value, idx) {
                            const d = new Date(value);
                            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit',
                                minute: '2-digit' });
                        },
                        interval: Math.max(1, Math.floor(data.length / 40)),
                    },
                    splitLine: { show: false },
                    axisTick: { show: false },
                },
                yAxis: [{
                    type: 'value',
                    scale: true,
                    position: 'left',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: {
                        lineStyle: { color: '#1a2330', type: 'dashed' },
                    },
                }, {
                    type: 'value',
                    scale: true,
                    position: 'right',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#6a82a0',
                        fontSize: 9,
                        formatter: (v) => {
                            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
                            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
                            return v.toString();
                        },
                    },
                    splitLine: { show: false },
                }],
                series: [{
                    name: '净买卖差',
                    type: 'bar',
                    data: diffs,
                    itemStyle: {
                        color: function(params) {
                            const val = params.value;
                            return val >= 0 ? 'rgba(46,204,113,0.7)' : 'rgba(231,76,60,0.7)';
                        },
                        borderRadius: [1, 1, 0, 0],
                    },
                    barWidth: '40%',
                }, {
                    name: '累积净差',
                    type: 'line',
                    yAxisIndex: 1,
                    data: cumDiffs,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: {
                        color: '#f39c12',
                        width: 2,
                    },
                    areaStyle: {
                        color: 'rgba(243,156,18,0.08)',
                    },
                }, ],
                animation: false,
            };

            subChart.setOption(optionSub, true);

            // ---- 更新统计 ----
            updateStats(data, symbol);
        }

        // ================================================================
        //  5. 统计信息更新
        // ================================================================

        function updateStats(data, symbol) {
            if (!data || data.length === 0) {
                document.getElementById('statOpen').textContent = '--';
                document.getElementById('statHigh').textContent = '--';
                document.getElementById('statLow').textContent = '--';
                document.getElementById('statClose').textContent = '--';
                document.getElementById('statVolume').textContent = '--';
                document.getElementById('statChange').textContent = '--';
                document.getElementById('statPoints').textContent = '--';
                return;
            }

            const cfg = CONFIG[symbol];
            const dec = cfg.decimals;
            const first = data[0];
            const last = data[data.length - 1];
            const high = Math.max(...data.map(d => d.high));
            const low = Math.min(...data.map(d => d.low));
            const totalVol = data.reduce((s, d) => s + d.volume, 0);
            const change = ((last.close - first.open) / first.open * 100);

            document.getElementById('statOpen').textContent = first.open.toFixed(dec);
            document.getElementById('statHigh').textContent = high.toFixed(dec);
            document.getElementById('statLow').textContent = low.toFixed(dec);
            document.getElementById('statClose').textContent = last.close.toFixed(dec);
            document.getElementById('statVolume').textContent = totalVol.toLocaleString();
            document.getElementById('statPoints').textContent = data.length;

            const changeEl = document.getElementById('statChange');
            changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            changeEl.className = 'stat-value ' + (change >= 0 ? 'green' : 'red');
        }

        // ================================================================
        //  6. 核心逻辑：加载数据 & 刷新图表
        // ================================================================

        function loadData() {
            const symbol = state.symbol;
            const periodKey = state.period;
            const periodMinutes = PERIOD_MAP[periodKey] || 5;

            // 生成原始分钟数据（缓存）
            if (state.rawData.length === 0 || state.rawData[0]?.symbol !== symbol) {
                state.rawData = generateMinuteData(symbol, 30);
                // 标记 symbol
                state.rawData._symbol = symbol;
            }

            // 过滤时间范围
            let filtered = state.rawData;
            if (state.startDate || state.endDate) {
                filtered = filterDataByTime(state.rawData, state.startDate, state.endDate);
            }

            // 聚合
            const aggregated = aggregateData(filtered, periodMinutes);
            state.aggregated = aggregated;

            // 渲染
            renderCharts(aggregated, symbol);
        }

        // ================================================================
        //  7. UI 事件绑定
        // ================================================================

        function bindEvents() {
            // ---- 币种切换 ----
            document.querySelectorAll('#symbolGroup .btn-symbol').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#symbolGroup .btn-symbol').forEach(b => b.classList.remove(
                    'active'));
                    this.classList.add('active');
                    state.symbol = this.dataset.symbol;
                    // 重置原始数据缓存，以便重新生成
                    state.rawData = [];
                    loadData();
                });
            });

            // ---- 周期切换 ----
            document.querySelectorAll('#periodGroup .btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#periodGroup .btn').forEach(b => b.classList.remove(
                    'active'));
                    this.classList.add('active');
                    state.period = this.dataset.period;
                    loadData();
                });
            });

            // ---- 自定义时间 ----
            const startInput = document.getElementById('startTime');
            const endInput = document.getElementById('endTime');

            // 设置默认值：最近7天
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            // 对齐到整分钟
            now.setSeconds(0, 0);
            sevenDaysAgo.setSeconds(0, 0);

            startInput.value = formatDatetimeLocal(sevenDaysAgo);
            endInput.value = formatDatetimeLocal(now);

            document.getElementById('applyCustom').addEventListener('click', function() {
                const startVal = startInput.value;
                const endVal = endInput.value;
                if (startVal) {
                    state.startDate = new Date(startVal);
                } else {
                    state.startDate = null;
                }
                if (endVal) {
                    state.endDate = new Date(endVal);
                } else {
                    state.endDate = null;
                }
                // 如果开始时间大于结束时间，交换
                if (state.startDate && state.endDate && state.startDate > state.endDate) {
                    const tmp = state.startDate;
                    state.startDate = state.endDate;
                    state.endDate = tmp;
                }
                loadData();
            });

            // 回车触发应用
            startInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById(
                    'applyCustom').click(); });
            endInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById(
                    'applyCustom').click(); });
        }

        function formatDatetimeLocal(date) {
            const pad = (n) => String(n).padStart(2, '0');
            const y = date.getFullYear();
            const mo = pad(date.getMonth() + 1);
            const d = pad(date.getDate());
            const h = pad(date.getHours());
            const mi = pad(date.getMinutes());
            return `${y}-${mo}-${d}T${h}:${mi}`;
        }

        // ================================================================
        //  8. 启动
        // ================================================================

        function init() {
            initCharts();
            bindEvents();
            // 加载默认数据
            state.symbol = 'BTC';
            state.period = '5m';
            state.rawData = [];
            loadData();
        }

        // 页面完全加载后启动
        window.addEventListener('load', init);

        // 暴露刷新给开发者控制台调试
        window.__refresh = loadData;
        window.__state = state;
        console.log('📊 OrderFlow 已启动! 可用命令: __refresh(), __state');
    </script>

</body>
