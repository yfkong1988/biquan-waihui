<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时订单流热力图 (Real-time Footprint)</title>
    <!-- 引入 Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0e11; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* 顶部控制栏 */
        .controls { height: 50px; background-color: #1e2329; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b3139; gap: 15px; }
        .logo { font-weight: bold; font-size: 18px; color: #fcd535; margin-right: 20px; }
        
        select, button {
            background-color: #2b3139; color: #eaecef; border: 1px solid #474d57; 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; outline: none; font-size: 14px;
        }
        select:hover, button:hover { background-color: #363c45; }
        button.active { background-color: #fcd535; color: #000; border-color: #fcd535; font-weight: bold; }

        /* 图表容器 */
        #chart-container { position: relative; width: 100%; height: calc(100vh - 50px); }
        
        /* 状态提示 */
        .status { margin-left: auto; font-size: 12px; color: #848e9c; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #f6465d; }
        .dot.connected { background-color: #0ecb81; box-shadow: 0 0 5px #0ecb81; }

        /* 自定义 Canvas 覆盖层样式 */
        canvas#footprint-canvas {
            position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="logo">OrderFlow Pro</div>
        
        <!-- 币种选择 -->
        <select id="symbol-select">
            <option value="btcusdt">BTC/USDT</option>
            <option value="bnbusdt">BNB/USDT</option>
            <option value="reusdt">RE/USDT (若无效请切回BTC)</option>
        </select>

        <!-- 时间周期 -->
        <div style="display:flex; gap:5px;">
            <button onclick="changeInterval('5m')" class="tf-btn active">5m</button>
            <button onclick="changeInterval('15m')" class="tf-btn">15m</button>
            <button onclick="changeInterval('30m')" class="tf-btn">30m</button>
            <button onclick="changeInterval('1h')" class="tf-btn">1h</button>
            <button onclick="changeInterval('4h')" class="tf-btn">4h</button>
            <button onclick="changeInterval('1d')" class="tf-btn">1D</button>
        </div>

        <div class="status">
            <div id="ws-dot" class="dot"></div>
            <span id="ws-text">未连接</span>
        </div>
    </div>

    <div id="chart-container">
        <!-- 这里的 Canvas 是画热力图的 -->
        <canvas id="footprint-canvas"></canvas>
    </div>

<script>
    // --- 配置与状态 ---
    let currentSymbol = 'btcusdt';
    let currentInterval = '5m';
    let ws = null;
    let chart = null;
    let candleSeries = null;
    
    // 存储 K 线数据用于绘制背景
    let candles = []; 
    // 存储订单流数据: Key="timestamp_price", Value={buyVol, sellVol}
    let footprintData = {}; 
    
    // 初始化图表
    function initChart() {
        const container = document.getElementById('chart-container');
        chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: '#0b0e11', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e2329' }, horzLines: { color: '#1e2329' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2b3139' },
            timeScale: { borderColor: '#2b3139', timeVisible: true },
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false, wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
        });

        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            chart.resize(container.clientWidth, container.clientHeight);
            drawFootprint(); // 重绘热力图
        });
        
        // 监听可视范围变化，重绘热力图
        chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
             drawFootprint();
        });
    }

    // --- 核心逻辑：获取历史 K 线 (作为骨架) ---
    async function fetchHistory() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol.toUpperCase()}&interval=${currentInterval}&limit=100`);
            const data = await res.json();
            
            candles = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4])
            }));
            
            candleSeries.setData(candles);
            
            // 清空旧的热力图数据
            footprintData = {};
            drawFootprint();
            
            // 重新连接 WebSocket
            connectWS();
        } catch (e) {
            console.error("Fetch Error:", e);
            alert("获取历史数据失败，请检查网络或币种代码是否正确");
        }
    }

    // --- 核心逻辑：WebSocket 实时数据 ---
    function connectWS() {
        if (ws) ws.close();
        
        updateStatus(false);
        // 订阅 aggTrade (聚合交易) 和 kline (K线更新)
        const streams = [
            `${currentSymbol}@aggTrade`, 
            `${currentSymbol}@kline_${currentInterval}`
        ];
        
        ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams.join('/')}`);
        
        ws.onopen = () => updateStatus(true);
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const stream = msg.stream;
            const data = msg.data;

            // 1. 处理实时成交 (构建热力图数据)
            if (stream.includes('aggTrade')) {
                processTrade(data);
            }
            
            // 2. 处理 K 线更新 (更新背景蜡烛)
            if (stream.includes('kline')) {
                const k = data.k;
                const candle = {
                    time: k.t / 1000,
                    open: parseFloat(k.o),
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: parseFloat(k.c)
                };
                // 更新最后一根 K 线或追加新 K 线
                candleSeries.update(candle);
                
                // 简单同步 candles 数组以便绘图使用
                const lastCandle = candles[candles.length - 1];
                if (lastCandle && lastCandle.time === candle.time) {
                    candles[candles.length - 1] = candle;
                } else {
                    candles.push(candle);
                }
            }
        };
        
        ws.onclose = () => updateStatus(false);
    }

    // 处理单笔成交，累加到 footprintData
    function processTrade(trade) {
        // trade.p = price, trade.q = quantity, trade.m = isBuyerMaker (true=卖单, false=买单)
        const price = parseFloat(trade.p);
        const qty = parseFloat(trade.q);
        const isSell = trade.m; 
        
        // 找到当前最新 K 线的时间戳作为 Key 的一部分，确保只统计当前周期的
        // 注意：这里简化处理，实际应该严格匹配 K 线时间
        const currentCandleTime = candles[candles.length-1]?.time || Math.floor(Date.now()/1000);
        
        // 为了性能，我们只保留最近几百根 K 线的数据，这里用 price 做 key 可能会太大
        // 优化策略：只存当前屏幕可见范围内的 K 线数据。
        // 简易版：我们直接用 price 字符串做 key，但在绘图时会根据 K 线过滤
        
        const key = `${price}`;
        if (!footprintData[key]) footprintData[key] = { buy: 0, sell: 0 };
        
        if (isSell) {
            footprintData[key].sell += qty;
        } else {
            footprintData[key].buy += qty;
        }
        
        // 实时重绘太耗性能，通常只在 K 线更新或定时重绘
        // 这里为了演示流畅性，我们限制重绘频率或使用 requestAnimationFrame
        requestAnimationFrame(drawFootprint);
    }

    // --- 核心逻辑：Canvas 绘制热力图 ---
    function drawFootprint() {
        const canvas = document.getElementById('footprint-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('chart-container');
        
        // 调整 Canvas 尺寸
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 获取当前屏幕显示的 K 线范围
        const logicalRange = chart.timeScale().getVisibleLogicalRange();
        if (!logicalRange) return;
        
        // 遍历 footprintData 中的每一个价格
        // 注意：真实场景中全量遍历会很慢，这里只做演示
        // 优化：只遍历当前 K 线 High-Low 之间的价格
        
        Object.keys(footprintData).forEach(priceStr => {
            const price = parseFloat(priceStr);
            const data = footprintData[priceStr];
            
            // 坐标转换：价格 -> Y轴像素
            const y = candleSeries.priceToCoordinate(price);
            
            // 如果价格在屏幕外，跳过
            if (y === null || y < 0 || y > canvas.height) return;
            
            // 决定颜色：净买入为绿，净卖出为红
            const netVol = data.buy - data.sell;
            const maxVol = Math.max(data.buy, data.sell);
            if (maxVol === 0) return;
            
            // 透明度算法：成交量越大越不透明
            const alpha = Math.min(maxVol / 10, 0.8); // 10是归一化系数，可根据币种调整
            
            let color = '';
            if (data.buy > data.sell) {
                // 绿色：rgba(14, 203, 129, alpha)
                color = `rgba(14, 203, 129, ${alpha})`;
            } else {
                // 红色：rgba(246, 70, 93, alpha)
                color = `rgba(246, 70, 93, ${alpha})`;
            }
            
            // 绘制横向条带 (模拟 Footprint 的格子)
            // 宽度设为全屏，或者根据时间范围设定
            // 这里为了视觉效果，我们画满整个横轴，代表该价格在全局的活跃度
            // *专业做法应该是只画在当前 K 线的时间宽度内*
            
            // 获取当前 K 线的时间宽度（像素）
            // 这是一个近似值，因为不同 K 线宽度可能不同
            const barWidth = 10; // 假设每个点宽 10px，实际应根据 timeScale 计算
            
            // 简易实现：画一条横线贯穿当前可视区域
            // 更好的实现：找到该价格所属的 K 线，只在那根 K 线的 X 范围内画
            
            ctx.fillStyle = color;
            // 这里我们做一个简化的可视化：在价格 Y 处画一个高度为 2px 的长条
            // 如果要完全复刻截图的格子，需要极其复杂的 X 轴时间对齐计算
            ctx.fillRect(0, y - 1, canvas.width, 2); 
            
            // 如果想看具体的数字，可以在这里 fillText，但会非常卡
        });
    }
    
    // --- UI 交互函数 ---
    function changeInterval(tf) {
        currentInterval = tf;
        // 更新按钮样式
        document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        fetchHistory();
    }
    
    document.getElementById('symbol-select').addEventListener('change', (e) => {
        currentSymbol = e.target.value;
        fetchHistory();
    });
    
    function updateStatus(isConnected) {
        const dot = document.getElementById('ws-dot');
        const text = document.getElementById('ws-text');
        if (isConnected) {
            dot.classList.add('connected');
            text.innerText = '实时数据接收中...';
        } else {
            dot.classList.remove('connected');
            text.innerText = '断开连接';
        }
    }

    // 启动
    initChart();
    fetchHistory();

</script>
</body>
</html>
