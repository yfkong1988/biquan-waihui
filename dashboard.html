<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单流可视化 - 演示版</title>
    <!-- 引入强大的图表库 -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1e222d; color: #d1d4dc; font-family: sans-serif; overflow: hidden; }
        #chart-container { width: 100vw; height: 90vh; position: relative; }
        .header { padding: 10px 20px; background: #131722; border-bottom: 1px solid #2a2e39; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 18px; color: #f0b90b; }
        .status { font-size: 12px; color: #787b86; }
        /* 模拟右侧的订单流热力图容器 */
        #order-flow-panel {
            position: absolute; right: 0; top: 0; bottom: 0; width: 150px;
            background: rgba(30, 34, 45, 0.8); border-left: 1px solid #2a2e39;
            pointer-events: none; /* 让鼠标事件穿透到图表 */
        }
    </style>
</head>
<body>

<div class="header">
    <h1>BTC/USDT 订单流视图 (模拟演示)</h1>
    <div class="status" id="status-text">正在初始化...</div>
</div>

<div id="chart-container"></div>

<script>
    // 1. 初始化图表
    const chartContainer = document.getElementById('chart-container');
    const chart = LightweightCharts.createChart(chartContainer, {
        layout: { background: { type: 'solid', color: '#1e222d' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: true },
    });

    // 创建K线系列
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });

    // 2. 生成模拟数据 (为了让图表不空着)
    let data = [];
    let time = Math.floor(Date.now() / 1000) - 10000; // 从1万秒前开始
    let price = 65000;

    for (let i = 0; i < 1000; i++) {
        let open = price;
        let close = price + (Math.random() - 0.5) * 100;
        let high = Math.max(open, close) + Math.random() * 50;
        let low = Math.min(open, close) - Math.random() * 50;
        
        data.push({ time: time + i * 60, open, high, low, close });
        price = close;
    }
    candleSeries.setData(data);

    // 3. 实时更新模拟数据
    setInterval(() => {
        const lastCandle = data[data.length - 1];
        const newTime = lastCandle.time + 60;
        const open = lastCandle.close;
        const close = open + (Math.random() - 0.5) * 50;
        const high = Math.max(open, close) + Math.random() * 20;
        const low = Math.min(open, close) - Math.random() * 20;
        
        const newCandle = { time: newTime, open, high, low, close };
        candleSeries.update(newCandle);
        data.push(newCandle);
        
        document.getElementById('status-text').innerText = "当前状态：模拟数据运行中 (演示模式)";
    }, 1000); // 每秒更新一次

    // 窗口大小改变时自适应
    window.addEventListener('resize', () => {
        chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
    });
</script>
</body>
</html>
