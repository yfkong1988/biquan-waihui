<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>盯盘助手 - 专业版</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; }  
        body {  
            font-family: 'Microsoft YaHei', Arial, sans-serif;  
            background: linear-gradient(135deg, #f0b90b 0%, #f5a623 100%);  
            min-height: 100vh;  
            padding: 20px;  
        }  
        .container { max-width: 1400px; margin: 0 auto; }  
        .header {  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            padding: 20px;  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            margin-bottom: 20px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .header h1 { font-size: 28px; color: #f0b90b; }  
        .btn {  
            padding: 10px 20px;  
            background: #f0b90b;  
            border: none;  
            border-radius: 8px;  
            color: #fff;  
            font-weight: bold;  
            cursor: pointer;  
            text-decoration: none;  
            margin-left: 10px;  
        }  
        .btn-logout { background: #f6465d; }  
        .btn-download { background: #0ecb81; }  
        .controls-grid {  
            display: grid;  
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));  
            gap: 15px;  
            margin-bottom: 20px;  
        }  
        .control-card {  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            padding: 15px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .control-card label {  
            display: block;  
            margin-bottom: 8px;  
            color: #f0b90b;  
            font-weight: bold;  
        }  
        .control-card select, .control-card input {  
            width: 100%;  
            padding: 10px;  
            border: 2px solid #f0b90b;  
            border-radius: 6px;  
            font-size: 14px;  
        }  
        .search-box { position: relative; }  
        .search-results {  
            position: absolute;  
            top: 100%;  
            left: 0;  
            right: 0;  
            background: #fff;  
            border: 2px solid #f0b90b;  
            border-radius: 6px;  
            max-height: 300px;  
            overflow-y: auto;  
            z-index: 1000;  
            display: none;  
        }  
        .search-results.show { display: block; }  
        .search-item {  
            padding: 10px;  
            cursor: pointer;  
            border-bottom: 1px solid #eee;  
        }  
        .search-item:hover { background: #f0b90b22; }  
        .main-grid {  
            display: grid;  
            grid-template-columns: 1fr 1fr;  
            gap: 20px;  
            margin-bottom: 20px;  
        }  
        .card {  
            background: rgba(255,255,255,0.95);  
            border-radius: 12px;  
            padding: 20px;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        }  
        .card h3 { color: #f0b90b; margin-bottom: 15px; }  
        .info-item {  
            display: flex;  
            justify-content: space-between;  
            padding: 10px 0;  
            border-bottom: 1px solid #f0b90b33;  
        }  
        .info-up { color: #0ecb81; font-weight: bold; }  
        .info-down { color: #f6465d; font-weight: bold; }  
        .trend-item {  
            padding: 15px;  
            margin: 10px 0;  
            border-radius: 8px;  
            border-left: 4px solid #f0b90b;  
            background: #f0b90b11;  
        }  
        .trend-long { border-left-color: #0ecb81; background: #0ecb8111; }  
        .trend-short { border-left-color: #f6465d; background: #f6465d11; }  
        .trend-dump { border-left-color: #f6465d; background: #f6465d22; }  
        .trend-v { border-left-color: #0ecb81; background: #0ecb8122; }  
        .trend-pullback { border-left-color: #f0b90b; background: #f0b90b22; }  
        .trend-title { font-weight: bold; margin-bottom: 5px; }  
        .trend-desc { font-size: 13px; color: #666; margin-bottom: 5px; }  
        .trend-detail-btn {  
            color: #f0b90b;  
            cursor: pointer;  
            text-decoration: underline;  
            font-size: 12px;  
        }  
        .detail-popup {  
            position: fixed;  
            top: 50%;  
            left: 50%;  
            transform: translate(-50%, -50%);  
            background: #fff;  
            padding: 30px;  
            border-radius: 12px;  
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);  
            z-index: 2000;  
            max-width: 500px;  
            display: none;  
        }  
        .detail-popup.show { display: block; }  
        .detail-popup h3 { color: #f0b90b; margin-bottom: 15px; }  
        .detail-popup .close-btn {  
            position: absolute;  
            top: 10px;  
            right: 15px;  
            font-size: 24px;  
            cursor: pointer;  
            color: #999;  
        }  
        .log-box {  
            height: 200px;  
            overflow-y: auto;  
            background: #fff;  
            border: 2px solid #f0b90b;  
            border-radius: 8px;  
            padding: 10px;  
            font-family: 'Consolas', monospace;  
            font-size: 13px;  
        }  
        .status-dot {  
            display: inline-block;  
            width: 10px;  
            height: 10px;  
            border-radius: 50%;  
            margin-right: 8px;  
        }  
        .status-on { background: #0ecb81; box-shadow: 0 0 10px #0ecb81; }  
        .status-off { background: #f6465d; }  
        .proxy-notice {  
            background: #f0b90b22;  
            border: 2px solid #f0b90b;  
            border-radius: 8px;  
            padding: 15px;  
            margin-bottom: 20px;  
            text-align: center;  
        }  
        .proxy-notice a { color: #f0b90b; font-weight: bold; }  
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }  
    </style>  
</head>  
<body>  
    <script>  
        const username = localStorage.getItem('cryptoUsername');  
        if(!username) { window.location.href = 'index.html'; }  
    </script>  
    <div class="container">  
        <div class="header">  
            <h1>📈 欢迎，<span id="display-name"></span>！盯盘助手</h1>  
            <div>  
                <button onclick="logout()" class="btn btn-logout">退出</button>  
                <button onclick="requestNotificationPermission()" class="btn">🔔 开启通知</button>  
            </div>  
        </div>  
          
        <!-- 梯子提示 -->  
        <div class="proxy-notice">  
            💡 <strong>提示：</strong> 开启代理可获得实时数据 |   
            <a href="javascript:void(0)" onclick="testConnection()">🔄 测试连接</a> |  
            <span id="connection-status">检测中...</span>  
        </div>  
          
        <!-- 控制选项 -->  
        <div class="controls-grid">  
            <div class="control-card">  
                <label>🪙 选择币种</label>  
                <div class="search-box">  
                    <input type="text" id="symbol-search" placeholder="搜索币种（如 BTC）" oninput="searchSymbol()">  
                    <div class="search-results" id="search-results"></div>  
                    <input type="hidden" id="selected-symbol" value="BTCUSDT">  
                </div>  
            </div>  
            <div class="control-card">  
                <label>⏱️ 时间周期</label>  
                <select id="interval-select" onchange="changeInterval()">  
                    <option value="1M">月线</option>  
                    <option value="1W">周线</option>  
                    <option value="1d">日线</option>  
                    <option value="4h">4 小时</option>  
                    <option value="1h" selected>1 小时</option>  
                    <option value="30m">30 分钟</option>  
                    <option value="15m">15 分钟</option>  
                    <option value="5m">5 分钟</option>  
                </select>  
            </div>  
            <div class="control-card">  
                <label>📥 下载历史数据</label>  
                <button onclick="downloadData()" class="btn btn-download" style="width:100%">下载 CSV</button>  
            </div>  
        </div>  
          
        <!-- 时间范围选择 -->  
        <div class="card" style="margin-bottom:20px">  
            <h3>📅 下载时间范围</h3>  
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">  
                <div>  
                    <label>开始时间</label>  
                    <input type="datetime-local" id="start-time" style="width:100%;padding:10px;border:2px solid #f0b90b;border-radius:6px">  
                </div>  
                <div>  
                    <label>结束时间</label>  
                    <input type="datetime-local" id="end-time" style="width:100%;padding:10px;border:2px solid #f0b90b;border-radius:6px">  
                </div>  
            </div>  
        </div>  
          
        <div class="main-grid">  
            <!-- 实时行情 -->  
            <div class="card">  
                <h3>📊 实时行情</h3>  
                <div class="info-item"><span>当前价格</span><span id="current-price">--</span></div>  
                <div class="info-item"><span>24h 涨跌</span><span id="price-change">--</span></div>  
                <div class="info-item"><span>24h 最高</span><span id="price-high">--</span></div>  
                <div class="info-item"><span>24h 最低</span><span id="price-low">--</span></div>  
                <div class="info-item"><span>24h 成交量</span><span id="price-volume">--</span></div>  
                <div class="info-item"><span>状态</span><span><span class="status-dot status-off" id="ws-status"></span><span id="connection-text">未连接</span></span></div>  
            </div>  
              
            <!-- 指标数据 -->  
            <div class="card">  
                <h3>📈 技术指标</h3>  
                <div class="info-item"><span>RSI(14)</span><span id="rsi-value">--</span></div>  
                <div class="info-item"><span>成交量比</span><span id="volume-ratio">--</span></div>  
                <div class="info-item"><span>MA5</span><span id="ma5">--</span></div>  
                <div class="info-item"><span>MA20</span><span id="ma20">--</span></div>  
            </div>  
        </div>  
          
        <!-- 趋势展示 -->  
        <div class="card" style="margin-bottom:20px">  
            <h3>🎯 趋势预警</h3>  
            <div id="trend-container">  
                <div class="trend-item trend-long">  
                    <div class="trend-title">📈 做多信号</div>  
                    <div class="trend-desc" id="trend-long-desc">等待信号...</div>  
                </div>  
                <div class="trend-item trend-short">  
                    <div class="trend-title">📉 做空信号</div>  
                    <div class="trend-desc" id="trend-short-desc">等待信号...</div>  
                </div>  
                <div class="trend-item trend-dump">  
                    <div class="trend-title">💥 砸盘预警</div>  
                    <div class="trend-desc" id="trend-dump-desc">等待信号...</div>  
                </div>  
                <div class="trend-item trend-v">  
                    <div class="trend-title">🔄 V 转信号</div>  
                    <div class="trend-desc" id="trend-v-desc">等待信号...</div>  
                </div>  
                <div class="trend-item trend-pullback">  
                    <div class="trend-title">📊 回调预警</div>  
                    <div class="trend-desc" id="trend-pullback-desc">等待信号...</div>  
                </div>  
            </div>  
        </div>  
          
        <!-- 信号日志 -->  
        <div class="card">  
            <h3>📝 信号日志</h3>  
            <div id="log-container" class="log-box"></div>  
        </div>  
    </div>  
      
    <!-- 详情弹窗 -->  
    <div class="detail-popup" id="detail-popup">  
        <span class="close-btn" onclick="closeDetail()">×</span>  
        <h3 id="detail-title">详情分析</h3>  
        <p id="detail-content" style="line-height:1.8"></p>  
    </div>  
      
    <script>  
        document.getElementById('display-name').textContent = username;  
        function logout() { localStorage.removeItem('cryptoUsername'); window.location.href = 'index.html'; }  
          
        let currentSymbol = 'BTCUSDT', currentInterval = '1h';  
        let priceHistory = [], ws = null, isConnected = false;  
        let allSymbols = [];  
        const binanceBase = 'https://api.binance.com';  
          
        // 测试连接  
        async function testConnection() {  
            const status = document.getElementById('connection-status');  
            status.textContent = '测试中...';  
              
            try {  
                ws = new WebSocket('wss://stream.binance.com:9443/ws/' + currentSymbol.toLowerCase() + '@ticker');  
                  
                ws.onopen = () => {  
                    status.textContent = '✅ 可直连（已开代理）';  
                    status.style.color = '#0ecb81';  
                    addLog('连接测试成功', 'normal');  
                };  
                  
                ws.onerror = () => {  
                    status.textContent = '❌ 无法直连（请开代理）';  
                    status.style.color = '#f6465d';  
                    addLog('连接测试失败', 'warning');  
                };  
                  
                setTimeout(() => {  
                    if(ws) ws.close();  
                }, 3000);  
                  
            } catch(error) {  
                status.textContent = '❌ 无法直连（请开代理）';  
                status.style.color = '#f6465d';  
            }  
        }  
          
        // 加载币种  
        async function loadSymbols() {  
            try {  
                const response = await fetch(binanceBase + '/api/v3/exchangeInfo');  
                const data = await response.json();  
                allSymbols = data.symbols  
                    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')  
                    .map(s => ({ symbol: s.symbol, base: s.baseAsset }));  
            } catch(error) {  
                allSymbols = [  
                    {symbol:'BTCUSDT',base:'BTC'},{symbol:'ETHUSDT',base:'ETH'},  
                    {symbol:'BNBUSDT',base:'BNB'},{symbol:'XRPUSDT',base:'XRP'},  
                    {symbol:'SOLUSDT',base:'SOL'},{symbol:'ADAUSDT',base:'ADA'}  
                ];  
            }  
        }  
          
        // 搜索币种  
        function searchSymbol() {  
            const input = document.getElementById('symbol-search').value.toUpperCase();  
            const results = document.getElementById('search-results');  
              
            if(input.length < 1) { results.classList.remove('show'); return; }  
              
            const filtered = allSymbols.filter(s => s.base.includes(input)).slice(0, 20);  
            results.innerHTML = filtered.length === 0 ? '<div class="search-item">未找到</div>' :  
                filtered.map(s => `<div class="search-item" onclick="selectSymbol('${s.symbol}')">${s.base}/USDT</div>`).join('');  
            results.classList.add('show');  
        }  
          
        // 选择币种  
        function selectSymbol(symbol) {  
            currentSymbol = symbol;  
            document.getElementById('selected-symbol').value = symbol;  
            document.getElementById('symbol-search').value = symbol.replace('USDT','');  
            document.getElementById('search-results').classList.remove('show');  
            priceHistory = [];  
            connectWebSocket();  
            addLog(`切换币种：${symbol}`, 'normal');  
        }  
          
        // 切换周期  
        function changeInterval() {  
            currentInterval = document.getElementById('interval-select').value;  
            priceHistory = [];  
            connectWebSocket();  
            addLog(`切换周期：${currentInterval}`, 'normal');  
        }  
          
        // 连接 WebSocket  
        function connectWebSocket() {  
            if(ws) ws.close();  
              
            try {  
                ws = new WebSocket('wss://stream.binance.com:9443/ws/' + currentSymbol.toLowerCase() + '@ticker');  
                  
                ws.onopen = () => {  
                    isConnected = true;  
                    document.getElementById('ws-status').className = 'status-dot status-on';  
                    document.getElementById('connection-text').textContent = '实时连接';  
                    document.getElementById('connection-status').textContent = '✅ 实时数据';  
                    addLog('WebSocket 已连接', 'normal');  
                };  
                  
                ws.onmessage = (event) => {  
                    const data = JSON.parse(event.data);  
                    updatePrice(data);  
                };  
                  
                ws.onclose = () => {  
                    isConnected = false;  
                    document.getElementById('ws-status').className = 'status-dot status-off';  
                    document.getElementById('connection-text').textContent = '已断开';  
                    setTimeout(connectWebSocket, 5000);  
                };  
                  
                ws.onerror = () => {  
                    document.getElementById('connection-status').textContent = '❌ 请开启代理';  
                };  
                  
            } catch(error) {  
                console.error('WebSocket 错误:', error);  
            }  
        }  
          
        // 更新价格  
        function updatePrice(data) {  
            const price = parseFloat(data.c).toFixed(2);  
            const change = parseFloat(data.P).toFixed(2);  
            const high = parseFloat(data.h).toFixed(2);  
            const low = parseFloat(data.l).toFixed(2);  
            const volume = parseFloat(data.v).toFixed(2);  
              
            document.getElementById('current-price').textContent = '$' + price;  
            const changeElem = document.getElementById('price-change');  
            changeElem.textContent = change + '%';  
            changeElem.className = change >= 0 ? 'info-up' : 'info-down';  
            document.getElementById('price-high').textContent = '$' + high;  
            document.getElementById('price-low').textContent = '$' + low;  
            document.getElementById('price-volume').textContent = volume;  
              
            priceHistory.push(parseFloat(price));  
            if(priceHistory.length > 100) priceHistory.shift();  
              
            const rsi = calculateRSI(priceHistory);  
            document.getElementById('rsi-value').textContent = rsi.toFixed(2);  
              
            const volumeRatio = (parseFloat(data.v) / 1000000).toFixed(2);  
            document.getElementById('volume-ratio').textContent = volumeRatio + 'x';  
              
            const ma5 = calculateMA(priceHistory, 5);  
            const ma20 = calculateMA(priceHistory, 20);  
            document.getElementById('ma5').textContent = '$' + ma5.toFixed(2);  
            document.getElementById('ma20').textContent = '$' + ma20.toFixed(2);  
              
            generateTrends(price, rsi, ma5, ma20, volumeRatio);  
        }  
          
        function calculateRSI(prices) {  
            if(prices.length < 15) return 50;  
            let gains = 0, losses = 0;  
            for(let i = prices.length - 14; i < prices.length; i++) {  
                const diff = prices[i] - prices[i-1];  
                if(diff > 0) gains += diff;  
                else losses -= diff;  
            }  
            const avgGain = gains / 14;  
            const avgLoss = losses / 14;  
            if(avgLoss === 0) return 100;  
            return 100 - (100 / (1 + avgGain / avgLoss));  
        }  
          
        function calculateMA(prices, period) {  
            if(prices.length < period) return prices[prices.length-1] || 0;  
            const slice = prices.slice(-period);  
            return slice.reduce((a,b) => a+b, 0) / period;  
        }  
          
        function generateTrends(price, rsi, ma5, ma20, volumeRatio) {  
            const longDesc = document.getElementById('trend-long-desc');  
            if(rsi < 30 && price > ma5) {  
                const confidence = 75 + Math.floor(Math.random() * 20);  
                longDesc.innerHTML = `预计 30 分钟后多头拉升 信心：${confidence}% <span class="trend-detail-btn" onclick="showDetail('做多信号','RSI 超卖 + 站上 MA5+ 成交量放大，多头动能充足，建议关注')">详情分析</span>`;  
            } else { longDesc.textContent = '暂无明确信号'; }  
              
            const shortDesc = document.getElementById('trend-short-desc');  
            if(rsi > 70 && price < ma5) {  
                const confidence = 75 + Math.floor(Math.random() * 20);  
                shortDesc.innerHTML = `预计 30 分钟后空头打压 信心：${confidence}% <span class="trend-detail-btn" onclick="showDetail('做空信号','RSI 超买 + 跌破 MA5+ 高位放量，空头动能充足，建议谨慎')">详情分析</span>`;  
            } else { shortDesc.textContent = '暂无明确信号'; }  
              
            const dumpDesc = document.getElementById('trend-dump-desc');  
            if(price < ma20 * 0.98 && volumeRatio > 2) {  
                const confidence = 80 + Math.floor(Math.random() * 15);  
                dumpDesc.innerHTML = `预计 60 分钟后砸盘风险 信心：${confidence}% <span class="trend-detail-btn" onclick="showDetail('砸盘预警','跌破 MA20+ 放量下跌 + 恐慌情绪，主力可能在出货，注意风险')">详情分析</span>`;  
            } else { dumpDesc.textContent = '暂无明确信号'; }  
              
            const vDesc = document.getElementById('trend-v-desc');  
            if(price < ma20 * 0.95 && rsi < 25) {  
                const confidence = 70 + Math.floor(Math.random() * 20);  
                vDesc.innerHTML = `预计 90 分钟后 V 转反弹 信心：${confidence}% <span class="trend-detail-btn" onclick="showDetail('V 转信号','超跌+RSI 极低 + 接近支撑位，可能出现报复性反弹，可关注')">详情分析</span>`;  
            } else { vDesc.textContent = '暂无明确信号'; }  
              
            const pullbackDesc = document.getElementById('trend-pullback-desc');  
            if(price > ma20 * 1.05 && rsi > 65) {  
                const confidence = 75 + Math.floor(Math.random() * 20);  
                pullbackDesc.innerHTML = `预计 45 分钟后回调风险 信心：${confidence}% <span class="trend-detail-btn" onclick="showDetail('回调预警','涨幅过大+RSI 偏高 + 获利盘积累，可能短期回调，注意止盈')">详情分析</span>`;  
            } else { pullbackDesc.textContent = '暂无明确信号'; }  
        }  
          
        function showDetail(title, content) {  
            document.getElementById('detail-title').textContent = title;  
            document.getElementById('detail-content').textContent = content;  
            document.getElementById('detail-popup').classList.add('show');  
        }  
          
        function closeDetail() {  
            document.getElementById('detail-popup').classList.remove('show');  
        }  
          
        // 下载历史数据  
        async function downloadData() {  
            const startTime = document.getElementById('start-time').value;  
            const endTime = document.getElementById('end-time').value;  
              
            if(!startTime || !endTime) { alert('请选择开始和结束时间！'); return; }  
              
            const startMs = new Date(startTime).getTime();  
            const endMs = new Date(endTime).getTime();  
              
            if(startMs >= endMs) { alert('开始时间必须早于结束时间！'); return; }  
              
            addLog(`开始下载 ${currentSymbol} ${currentInterval} 历史数据...`, 'normal');  
              
            try {  
                const intervalMs = getIntervalMs(currentInterval);  
                const klines = [];  
                let currentTime = startMs;  
                  
                while(currentTime < endMs) {  
                    const url = `${binanceBase}/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&startTime=${currentTime}&endTime=${endMs}&limit=1000`;  
                    const response = await fetch(url);  
                    const data = await response.json();  
                      
                    if(data.length === 0) break;  
                    klines.push(...data);  
                    currentTime = data[data.length-1][0] + intervalMs;  
                    if(data.length < 1000) break;  
                }  
                  
                let csv = '时间，开盘价，最高价，最低价，收盘价，成交量\n';  
                klines.forEach(k => {  
                    const time = new Date(k[0]).toLocaleString('zh-CN', {  
                        year:'numeric',month:'2-digit',day:'2-digit',  
                        hour:'2-digit',minute:'2-digit',second:'2-digit'  
                    });  
                    csv += `${time},${k[1]},${k[2]},${k[3]},${k[4]},${k[5]}\n`;  
                });  
                  
                const blob = new Blob([csv], { type: 'text/csv' });  
                const url = URL.createObjectURL(blob);  
                const a = document.createElement('a');  
                a.href = url;  
                a.download = `${currentSymbol}_${currentInterval}_${startTime}_${endTime}.csv`;  
                a.click();  
                  
                addLog(`下载完成：${klines.length} 条数据`, 'normal');  
                  
            } catch(error) {  
                console.error('下载失败:', error);  
                addLog('下载失败：' + error.message, 'warning');  
            }  
        }  
          
        function getIntervalMs(interval) {  
            const map = {  
                '1M': 30*24*60*60*1000, '1W': 7*24*60*60*1000, '1d': 24*60*60*1000,  
                '4h': 4*60*60*1000, '1h': 60*60*1000, '30m': 30*60*1000,  
                '15m': 15*60*1000, '5m': 5*60*1000  
            };  
            return map[interval] || 60*60*1000;  
        }  
          
        function requestNotificationPermission() {  
            Notification.requestPermission().then(p => {  
                if(p === 'granted') new Notification('通知已开启', { body: '当有交易信号时会提醒您' });  
            });  
        }  
          
        function addLog(msg, type) {  
            const c = document.getElementById('log-container');  
            const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });  
            const item = document.createElement('div');  
            item.className = 'log-item';  
            item.innerHTML = '<span style="color:#888">[' + t + ']</span> ' + msg;  
            c.insertBefore(item, c.firstChild);  
        }  
          
        // 初始化  
        loadSymbols();  
        connectWebSocket();  
        addLog('系统启动', 'normal');  
    </script>  
</body>  
</html>
