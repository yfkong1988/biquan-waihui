<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT 实时订单流 (最终修复版)</title>
    
    <!-- 【关键修改】锁定使用 v3.8.0 版本，这是最稳定的版本 -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #131722; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif; overflow: hidden; }
        
        /* 顶部状态栏 */
        .header { 
            position: absolute; top: 0; left: 0; right: 0; height: 40px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background-color: #1e222d; border-bottom: 1px solid #2a2e39; z-index: 10;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .connected { background-color: #26a69a; box-shadow: 0 0 8px #26a69a; }
        .disconnected { background-color: #ef5350; }
        
        /* 图表容器 */
        #chart-container { width: 100%; height: 100vh; position: relative; }
        
        /* 左下角图例 */
        .legend {
            position: absolute; bottom: 20px; left: 20px; z-index: 5;
            background: rgba(30, 34, 45, 0.8); padding: 10px; border-radius: 4px;
            font-size: 12px; pointer-events: none; border: 1px solid #2a2e39;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
        .legend-color { width: 10px; height: 10px; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: #f0b90b;">BTC/USDT 实时订单流 (Binance Stream)</div>
        <div id="connection-status" style="font-size: 12px; color: #ef5350;">
            <span class="status-dot disconnected"></span><span id="status-text">正在连接...</span>
        </div>
    </div>

    <div id="chart-container"></div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background: #26a69a;"></div>主动买入 (Aggressive Buy)</div>
        <div class="legend-item"><div class="legend-color" style="background: #ef5350;"></div>主动卖出 (Aggressive Sell)</div>
        <div style="color: #787b86; margin-top: 4px; font-size: 10px;">*圆点大小代表成交量大小</div>
    </div>

    <script>
        // 1. 初始化图表
        const chartContainer = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: chartContainer.clientHeight,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#242832' }, horzLines: { color: '#242832' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { borderColor: '#485c7b' },
            timeScale: { borderColor: '#485c7b', timeVisible: true, secondsVisible: true },
        });

        // 【关键修复】使用 v3.8.0 的标准 API
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        });

        // 用于绘制订单流的散点系列 (Markers)
        // 注意：Lightweight Charts 原生不支持动态气泡大小，我们用 Markers 模拟
        // 为了性能，我们只保留最近 200 个标记
        
        // 窗口自适应
        window.addEventListener('resize', () => {
            chart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
        });

        // 2. WebSocket 连接逻辑
        let ws = null;
        let lastCandle = null;
        const statusText = document.getElementById('status-text');
        const statusDot = document.querySelector('.status-dot');
        const statusBox = document.getElementById('connection-status');

        function connect() {
            // 使用币安现货 WebSocket
            ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

            ws.onopen = () => {
                statusText.innerText = '已连接 - 接收数据中';
                statusBox.style.color = '#26a69a';
                statusDot.className = 'status-dot connected';
                console.log('WebSocket Connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleTrade(data);
            };

            ws.onerror = (err) => {
                console.error('WebSocket Error:', err);
                updateStatus(false);
            };

            ws.onclose = () => {
                updateStatus(false);
                // 断线重连机制：3秒后重试
                setTimeout(connect, 3000);
            };
        }

        function updateStatus(isConnected) {
            if (!isConnected) {
                statusText.innerText = '连接断开 - 正在重连...';
                statusBox.style.color = '#ef5350';
                statusDot.className = 'status-dot disconnected';
            }
        }

        // 3. 数据处理与渲染
        // 由于 Trade 流只有逐笔成交，我们需要自己在前端合成 1分钟 K线
        let currentBar = {
            time: null, open: null, high: null, low: null, close: null
        };

        function handleTrade(trade) {
            const price = parseFloat(trade.p);
            const time = Math.floor(trade.T / 1000); // 转换为秒级时间戳
            const quantity = parseFloat(trade.q);
            const isBuyerMaker = trade.m; // true=主动卖出, false=主动买入

            // --- A. 更新 K 线数据 (合成 1 分钟 K 线) ---
            // 计算当前分钟的起始时间 (向下取整到 60 的倍数)
            const barTime = time - (time % 60); 

            if (!currentBar.time || barTime !== currentBar.time) {
                // 开启新的一根 K 线
                if (currentBar.time) {
                    // 如果不是第一根，先确认上一根（这里简化处理，直接设为历史）
                }
                currentBar = {
                    time: barTime,
                    open: price,
                    high: price,
                    low: price,
                    close: price
                };
            } else {
                // 更新当前 K 线
                currentBar.high = Math.max(currentBar.high, price);
                currentBar.low = Math.min(currentBar.low, price);
                currentBar.close = price;
            }
            
            // 实时更新图表上的 K 线
            candleSeries.update(currentBar);

            // --- B. 绘制订单流 (Markers) ---
            // 注意：Markers 是绑定在具体时间点的。
            // 这里的逻辑稍微复杂：我们需要把 Marker 加到对应的时间点上。
            // 但 Lightweight Charts 的 update 会覆盖同时间的 marker。
            // 更好的方式是维护一个 markers 数组，每次 push 新的进去，然后 setMarkers。
            
            // 为了演示流畅性，我们只在价格变动时添加标记
            
            // 简单的视觉映射：买单绿色，卖单红色
            // 实际上应该累积同时间的量，但这里为了实时性直接显示
            const marker = {
                time: time, // 使用精确时间
                position: isBuyerMaker ? 'belowBar' : 'aboveBar',
                color: isBuyerMaker ? '#ef5350' : '#26a69a', // 红色卖，绿色买
                shape: 'circle',
                size: 0.5 // 基础大小
            };

            // 获取当前所有 markers 并添加新的
            // 警告：频繁 setMarkers 可能会卡顿，生产环境需要节流或聚合
            // 这里为了演示“实时跳动”，我们做一个简化的聚合：
            // 仅当这是该秒的第一笔，或者累积量变化时更新
            
            // 简易方案：直接追加到图表（实际开发建议用 Scatter Series，但 LWC 免费版没有，只能用 Marker 模拟）
            // 为了不卡死浏览器，我们限制 markers 数量
            // 这里我们用一个 trick：不全部重绘，而是利用 update 的特性？不行，Marker 必须全量 set。
            // 既然是 Demo，我们每 10 笔更新一次 UI，或者每秒更新一次。
            
            // *优化策略*：由于 JS 单线程处理高频 WS 会卡，我们做一个缓冲
            bufferTrades.push(marker);
        }

        // 缓冲区：每 200ms 批量渲染一次 Markers，防止页面卡死
        let bufferTrades = [];
        let allMarkers = []; // 存储所有历史 Markers

        setInterval(() => {
            if (bufferTrades.length > 0) {
                // 合并新数据
                allMarkers = allMarkers.concat(bufferTrades);
                
                // 性能保护：只保留最近 300 个点，否则浏览器会崩
                if (allMarkers.length > 300) {
                    allMarkers = allMarkers.slice(allMarkers.length - 300);
                }

                // 设置到图表
                // 注意：setMarkers 会清除之前的，所以必须传入全量数组
                candleSeries.setMarkers(allMarkers);
                
                // 清空缓冲
                bufferTrades = [];
            }
        }, 200); // 200毫秒刷新一次视觉

        // 启动连接
        connect();

    </script>
</body>
</html>
