<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>📊 进入盯盘助手</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; }  
        body {  
            font-family: 'Microsoft YaHei', Arial, sans-serif;  
            background: linear-gradient(135deg, #f0b90b 0%, #f5a623 100%);  
            height: 100vh;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            overflow: hidden;  
        }  
        .container { text-align: center; animation: fadeIn 1s ease-in; }  
        h1 {  
            font-size: 48px;  
            color: #fff;  
            margin-bottom: 40px;  
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);  
        }  
        .input-box {  
            padding: 15px 30px;  
            font-size: 18px;  
            border: 3px solid #fff;  
            border-radius: 50px;  
            background: rgba(255,255,255,0.9);  
            margin-bottom: 20px;  
            width: 300px;  
            text-align: center;  
        }  
        .enter-btn {  
            padding: 20px 60px;  
            font-size: 24px;  
            font-weight: bold;  
            color: #f0b90b;  
            background: #fff;  
            border: none;  
            border-radius: 50px;  
            cursor: pointer;  
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);  
            transition: all 0.3s;  
            display: inline-block;  
        }  
        .enter-btn:hover { transform: scale(1.1); }  
        .enter-btn:disabled {  
            opacity: 0.5;  
            cursor: not-allowed;  
            transform: none;  
        }  
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }  
    </style>  
</head>  
<body>  
    <div class="container">  
        <h1>📊 进入盯盘助手</h1>  
        <input type="text" id="username" class="input-box" placeholder="输入你的名字" maxlength="20">  
        <br>  
        <button id="enterBtn" class="enter-btn" disabled>进入</button>  
    </div>  
    <script>  
        const input = document.getElementById('username');  
        const btn = document.getElementById('enterBtn');  
          
        input.addEventListener('input', function() {  
            btn.disabled = this.value.trim() === '';  
        });  
          
        btn.addEventListener('click', function() {  
            const name = input.value.trim();  
            if(name) {  
                localStorage.setItem('cryptoUsername', name);  
                window.location.href = 'dashboard.html';  
            }  
        });  
          
        if(localStorage.getItem('cryptoUsername')) {  
            window.location.href = 'dashboard.html';  
        }  
    </script>  
</body>  
</html>
