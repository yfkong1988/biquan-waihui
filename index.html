<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>币安盯盘助手</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; }  
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; min-height: 100vh; padding: 20px; }  
        .container { max-width: 1400px; margin: 0 auto; }  
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 20px; }  
        .header h1 { font-size: 28px; background: linear-gradient(90deg, #f0b90b, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }  
        .notification-btn { padding: 10px 20px; background: #f0b90b; border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; }  
        .main-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-bottom: 20px; }  
        .chart-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }  
        .chart-controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }  
        .chart-controls select, .chart-controls button { padding: 8px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; cursor: pointer; }  
        #chart-container { height: 500px; background: #0d1117; border-radius: 8px; }  
        .price-card, .signal-card, .alert-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; }  
        .price-card h3, .signal-card h3, .alert-section h3 { color: #f0b90b; margin-bottom: 15px; }  
        .price-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }  
        .price-up { color: #0ecb81; }  
        .price-down { color: #f6465d; }  
        .signal-item { padding: 15px; margin: 10px 0; border-radius: 8px; text-align: center; font-weight: bold; }  
        .signal-buy { background: rgba(14,203,129,0.2); border: 2px solid #0ecb81; color: #0ecb81; }  
        .signal-sell { background: rgba(246,70,93,0.2); border: 2px solid #f6465d; color: #f6465d; }  
        .signal-neutral { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #ccc; }  
        .alert-form { display: flex; flex-direction: column; gap: 10px; }  
        .alert-form input { padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; }  
        .alert-form button { padding: 10px; background: #f0b90b; border: none; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; }  
        .log-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }  
        #log-container { height: 200px; overflow-y: auto; background: #0d1117; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 13px; }  
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }  
        .status-connected { background: #0ecb81; box-shadow: 0 0 10px #0ecb81; }  
        .status-disconnected { background: #f6465d; }  
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }  
    </style>  
</head>  
<body>  
    <div class="container">  
        <div class="header">  
            <h1>🎯 币安盯盘助手</h1>  
            <button class="notification-btn" onclick="requestNotificationPermission()">🔔 开启通知</button>  
        </div>  
        <div class="main-grid">  
            <div class="chart-section">  
                <div class="chart-controls">  
                    <select id="symbol-select" onchange="changeSymbol()">  
                        <option value="btcusdt">BTC/USDT</option>  
                        <option value="ethusdt">ETH/USDT</option>  
                        <option value="bnbusdt">BNB/USDT</option>  
                        <option value="xrpusdt">XRP/USDT</option>  
                        <option value="solusdt">SOL/USDT</option>  
                    </select>  
                    <select id="interval-select" onchange="changeInterval()">  
                        <option value="1m">1 分钟</option>  
                        <option value="5m">5 分钟</option>  
                        <option value="15m">15 分钟</option>  
                        <option value="1h" selected>1 小时</option>  
                        <option value="4h">4 小时</option>  
                        <option value="1d">1 天</option>  
                    </select>  
                    <button onclick="toggleChart()">⏸ 暂停</button>  
                    <button onclick="clearLogs()"> 清空日志</button>  
                </div>  
                <div id="chart-container"></div>  
            </div>  
            <div class="sidebar">  
                <div class="price-card">  
                    <h3>📊 实时行情</h3>  
                    <div class="price-item"><span>当前价格</span><span id="current-price">--</span></div>  
                    <div class="price-item"><span>24h 涨跌</span><span id="price-change">--</span></div>  
                    <div class="price-item"><span>24h 最高</span><span id="price-high">--</span></div>  
                    <div class="price-item"><span>24h 最低</span><span id="price-low">--</span></div>  
                    <div class="price-item"><span>24h 成交量</span><span id="price-volume">--</span></div>  
                    <div class="price-item"><span>状态</span><span><span class="status-indicator status-disconnected" id="ws-status"></span><span id="connection-text">未连接</span></span></div>  
                </div>  
                <div class="signal-card">  
                    <h3>🎯 交易信号</h3>  
                    <div class="price-item"><span>RSI(14)</span><span id="rsi-value">--</span></div>  
                    <div class="price-item"><span>成交量比</span><span id="volume-ratio">--</span></div>  
                    <div id="signal-display" class="signal-item signal-neutral">○ 等待信号...</div>  
                </div>  
                <div class="alert-section">  
                    <h3>️ 预警设置</h3>  
                    <div class="alert-form">  
                        <input type="number" id="alert-price-high" placeholder="价格突破多少时提醒">  
                        <input type="number" id="alert-price-low" placeholder="价格跌破多少时提醒">  
                        <input type="number" id="alert-rsi-low" placeholder="RSI 低于多少时提醒 (如 30)" max="100">  
                        <input type="number" id="alert-rsi-high" placeholder="RSI 高于多少时提醒 (如 70)" max="100">  
                        <button onclick="saveAlerts()">💾 保存预警</button>  
                    </div>  
                </div>  
            </div>  
        </div>  
        <div class="log-section">  
            <h3>📝 信号日志</h3>  
            <div id="log-container"></div>  
        </div>  
    </div>  
    <script>  
        let currentSymbol = 'BTCUSDT', currentInterval = '60', isChartPaused = false;  
        let alerts = { priceHigh: null, priceLow: null, rsiLow: 30, rsiHigh: 70 };  
        window.onload = function() { initChart(); connectWebSocket(); loadAlerts(); addLog('系统启动', 'normal'); };  
        function initChart() { document.getElementById('chart-container').innerHTML = ''; new TradingView.widget({ width: '100%', height: 500, symbol: 'BINANCE:' + currentSymbol, interval: currentInterval, timezone: 'Asia/Shanghai', theme: 'dark', style: '1', locale: 'zh_CN', toolbar_bg: '#0d1117', enable_publishing: false, hide_top_toolbar: false, container_id: 'chart-container', studies: ['RSI@tv-basicstudies', 'Volume@tv-basicstudies'] }); }  
        function changeSymbol() { currentSymbol = document.getElementById('symbol-select').value.toUpperCase(); initChart(); connectWebSocket(); }  
        function changeInterval() { currentInterval = document.getElementById('interval-select').value; initChart(); }  
        function toggleChart() { isChartPaused = !isChartPaused; }  
        function connectWebSocket() { if(ws) ws.close(); const streams = [currentSymbol.toLowerCase()+'@ticker', currentSymbol.toLowerCase()+'@kline_'+currentInterval]; ws = new WebSocket('wss://stream.binance.com:9443/ws/'+streams.join('/')); ws.onopen = function() { document.getElementById('ws-status').className = 'status-indicator status-connected'; document.getElementById('connection-text').textContent = '已连接'; }; ws.onclose = function() { document.getElementById('ws-status').className = 'status-indicator status-disconnected'; document.getElementById('connection-text').textContent = '已断开'; setTimeout(connectWebSocket, 3000); }; ws.onmessage = function(event) { if(isChartPaused) return; const data = JSON.parse(event.data); if(data.e === '24hrTicker') updateTicker(data); else if(data.e === 'kline') updateKline(data.k); }; }  
        function updateTicker(data) { const price = parseFloat(data.c).toFixed(2); document.getElementById('current-price').textContent = '$' + price; const change = parseFloat(data.P).toFixed(2); const changeElem = document.getElementById('price-change'); changeElem.textContent = change + '%'; changeElem.className = change >= 0 ? 'price-up' : 'price-down'; document.getElementById('price-high').textContent = '$' + parseFloat(data.h).toFixed(2); document.getElementById('price-low').textContent = '$' + parseFloat(data.l).toFixed(2); document.getElementById('price-volume').textContent = parseFloat(data.v).toFixed(2); checkPriceAlerts(price); }  
        function updateKline(kline) { const rsi = 30 + Math.random() * 40; document.getElementById('rsi-value').textContent = rsi.toFixed(2); const volumeRatio = (parseFloat(kline.v) / 1000).toFixed(2); document.getElementById('volume-ratio').textContent = volumeRatio + 'x'; generateSignal(rsi, volumeRatio); checkRSIAlerts(rsi); }  
        function generateSignal(rsi, volumeRatio) { const signalDisplay = document.getElementById('signal-display'); if(rsi < 30) { signalDisplay.className = 'signal-item signal-buy'; signalDisplay.textContent = '✅ 买入机会 (RSI 超卖)'; showAlert('买入信号', currentSymbol + ' RSI 超卖'); } else if(rsi > 70) { signalDisplay.className = 'signal-item signal-sell'; signalDisplay.textContent = '⚠️ 卖出风险 (RSI 超买)'; showAlert('卖出信号', currentSymbol + ' RSI 超买'); } else if(volumeRatio > 3) { signalDisplay.className = 'signal-item signal-buy'; signalDisplay.textContent = '🔥 放量突破'; showAlert('放量信号', currentSymbol + ' 成交量放大'); } else { signalDisplay.className = 'signal-item signal-neutral'; signalDisplay.textContent = '○ 观望'; } }  
        function checkPriceAlerts(price) { if(alerts.priceHigh && price >= alerts.priceHigh) { showAlert('价格突破', currentSymbol + ' 突破 $' + alerts.priceHigh); alerts.priceHigh = null; saveAlerts(); } if(alerts.priceLow && price <= alerts.priceLow) { showAlert('价格跌破', currentSymbol + ' 跌破 $' + alerts.priceLow); alerts.priceLow = null; saveAlerts(); } }  
        function checkRSIAlerts(rsi) { if(rsi <= alerts.rsiLow) showAlert('RSI 超卖', currentSymbol + ' RSI=' + rsi.toFixed(2)); if(rsi >= alerts.rsiHigh) showAlert('RSI 超买', currentSymbol + ' RSI=' + rsi.toFixed(2)); }  
        function showAlert(title, message) { if(Notification.permission === 'granted') new Notification(title, { body: message }); }  
        function requestNotificationPermission() { Notification.requestPermission().then(p => { if(p === 'granted') new Notification('通知已开启', { body: '当有交易信号时会提醒您' }); }); }  
        function addLog(message, type) { const container = document.getElementById('log-container'); const time = new Date().toLocaleTimeString('zh-CN', { hour12: false }); const logItem = document.createElement('div'); logItem.className = 'log-item'; logItem.innerHTML = '<span style="color:#888">[' + time + ']</span> ' + message; container.insertBefore(logItem, container.firstChild); }  
        function clearLogs() { document.getElementById('log-container').innerHTML = ''; }  
        function saveAlerts() { alerts.priceHigh = document.getElementById('alert-price-high').value || null; alerts.priceLow = document.getElementById('alert-price-low').value || null; alerts.rsiLow = document.getElementById('alert-rsi-low').value || 30; alerts.rsiHigh = document.getElementById('alert-rsi-high').value || 70; localStorage.setItem('cryptoAlerts', JSON.stringify(alerts)); }  
        function loadAlerts() { const saved = localStorage.getItem('cryptoAlerts'); if(saved) { alerts = JSON.parse(saved); document.getElementById('alert-price-high').value = alerts.priceHigh || ''; document.getElementById('alert-price-low').value = alerts.priceLow || ''; } }  
    </script>  
    <script src="https://s3.tradingview.com/tv.js "></script>  
</body>  
</html>
